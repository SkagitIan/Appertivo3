<div
  id="slideMenu"
  class="fixed top-0 right-0 z-40 h-full w-64 transform translate-x-full border-l border-slate-700/60 bg-slate-900/95 text-slate-100 shadow-[0_45px_90px_-40px_rgba(8,11,19,0.9)] transition-transform duration-300"
  aria-hidden="true"
>
  <div class="pt-20 px-6 space-y-4">
    <a
      href="{% if demo_mode %}{% url 'swipe:demo_favorites' %}{% else %}{% url 'swipe:favorites' %}{% endif %}"
      class="block border-b border-slate-700/40 pb-4 text-sm tracking-[0.3em] uppercase text-slate-300 hover:text-white"
    >
      Favorites Archive
    </a>
    <a
      href="{% if demo_mode %}{% url 'swipe:demo_settings' %}{% else %}{% url 'swipe:settings' %}{% endif %}"
      class="block border-b border-slate-700/40 pb-4 text-sm tracking-[0.3em] uppercase text-slate-300 hover:text-white"
    >
      Settings
    </a>
    {% if not demo_mode %}
      <a
        href="{% url 'swipe:swipe-demo' %}"
        class="block border-b border-slate-700/40 pb-4 text-sm tracking-[0.3em] uppercase text-slate-300 hover:text-white"
      >
        Demo Mode
      </a>
    {% endif %}
    <div class="pt-4 border-t border-slate-700/40">
      <div
        class="view-toggle w-full"
        role="group"
        aria-label="Choose layout view"
        data-view-toggle
        data-view-default="swipe"
      >
        <button
          type="button"
          class="view-toggle-btn"
          data-view-option="swipe"
          data-view-target="#swipeView"
          aria-pressed="true"
        >
          Swipe view
        </button>
        <button
          type="button"
          class="view-toggle-btn"
          data-view-option="tower"
          data-view-target="#towerView"
          aria-pressed="false"
        >
          Tower view
        </button>
      </div>
    </div>
  </div>
</div>
