<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}Appertivo · Swipe{% endblock %}</title>
  {% block seo_meta %}
    <meta name="description" content="Explore Appertivo Swipe to discover chef-ready menu concepts, flavor pairings, and AI-crafted dishes for restaurants."/>
    <meta name="keywords" content="restaurant innovation, menu engineering, culinary concepts, ai menu builder"/>
    <meta name="author" content="Appertivo"/>
    <meta name="robots" content="index,follow"/>
    <link rel="canonical" href="https://appertivo.com/swipe/"/>
    <meta property="og:locale" content="en_US"/>
    <meta property="og:type" content="website"/>
    <meta property="og:title" content="Appertivo · Swipe"/>
    <meta property="og:description" content="Explore Appertivo Swipe to discover chef-ready menu concepts, flavor pairings, and AI-crafted dishes for restaurants."/>
    <meta property="og:url" content="https://appertivo.com/swipe/"/>
    <meta property="og:site_name" content="Appertivo Swipe"/>
    <meta property="og:image" content="https://placehold.co/1200x630?text=Appertivo+Swipe"/>
    <meta property="og:image:alt" content="Chef browsing Appertivo Swipe culinary concepts"/>
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="Appertivo · Swipe"/>
    <meta name="twitter:description" content="Explore Appertivo Swipe to discover chef-ready menu concepts, flavor pairings, and AI-crafted dishes for restaurants."/>
    <meta name="twitter:image" content="https://placehold.co/1200x630?text=Appertivo+Swipe"/>
    <meta name="twitter:image:alt" content="Chef browsing Appertivo Swipe culinary concepts"/>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Appertivo Swipe",
        "url": "https://appertivo.com/swipe/",
        "description": "Appertivo Swipe helps culinary teams evaluate AI-assisted menu ideas, save favorites, and share dishes with stakeholders.",
        "applicationCategory": "BusinessApplication",
        "publisher": {
          "@type": "Organization",
          "name": "Appertivo",
          "url": "https://appertivo.com"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  {% endblock %}
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
  <style>
    :root{
      --ap-purple:#B993D6; --ap-orange:#f08000; --ap-teal:#58B09C;
      --ap-slate:#49475B;  --ap-black:#14080E;
    }
    body{ background: var(--ap-black); color:#fff; }
    .glass{ background:rgba(20,8,14,.6); backdrop-filter: blur(10px); }
    .price-tag{ background:#b22222; color:#fff; padding:.15rem .5rem; border-radius:.4rem; font-weight:700; font-size:.8rem; }
    .badge{ background:rgba(255,255,255,.12); border-radius:.6rem; padding:.15rem .5rem; margin:.15rem; font-size:.75rem; }
    .fav{ transition: transform .15s ease; cursor:pointer; }
    .fav:active{ transform: scale(1.15); }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen">

  <main class="pt-14">{% block content %}{% endblock %}</main>


  {% block scripts %}{% endblock %}
</body>
</html>
