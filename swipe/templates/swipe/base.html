<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}Appertivo · Swipe{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
  <style>
    :root{
      --ap-purple:#B993D6; --ap-orange:#f08000; --ap-teal:#58B09C;
      --ap-slate:#49475B;  --ap-black:#14080E;
    }
    body{ background: var(--ap-black); color:#fff; }
    .glass{ background:rgba(20,8,14,.6); backdrop-filter: blur(10px); }
    .price-tag{ background:#b22222; color:#fff; padding:.15rem .5rem; border-radius:.4rem; font-weight:700; font-size:.8rem; }
    .badge{ background:rgba(255,255,255,.12); border-radius:.6rem; padding:.15rem .5rem; margin:.15rem; font-size:.75rem; }
    .fav{ transition: transform .15s ease; cursor:pointer; }
    .fav:active{ transform: scale(1.15); }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen">

  <main class="pt-14">{% block content %}{% endblock %}</main>


  {% block scripts %}{% endblock %}
</body>
</html>
