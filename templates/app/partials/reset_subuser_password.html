<li class="bg-slate-50 rounded p-4 mt-2">
  <form 
    method="post"
    hx-post="{% url 'reset_subuser_password' subuser.id %}"
    hx-target="closest li"
    hx-swap="outerHTML"
    class="space-y-3"
  >
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
          {{ field.label }}
        </label>
        {{ field }}
        {% if field.errors %}
          <p class="mt-1 text-sm text-red-600">{{ field.errors|join:", " }}</p>
        {% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="bg-[#B993D6] text-white px-4 py-2 rounded-md hover:opacity-90">
      Save Password
    </button>
  </form>
</li>
