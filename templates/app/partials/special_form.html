<form method="post"
      action="{% if special %}{% url 'special_edit' special.id %}{% else %}{% url 'create_special' %}{% endif %}"
      enctype="multipart/form-data" class="p-6 space-y-6">
    {% csrf_token %}

    <!-- Image Upload -->
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">
            Special Image
        </label>
        <div id="image-upload-area"
             class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-slate-300 border-dashed rounded-lg hover:border-slate-400 transition-colors">
            {% if special and special.image %}
                <div id="image-preview" class="text-center">
                    <img src="{{ special.image.url }}" class="max-h-48 rounded-lg mx-auto" alt="Preview">
                    <button type="button" id="remove-image" class="mt-2 text-sm text-red-600 hover:text-red-700">Remove image</button>
                </div>
            {% else %}
                <div id="upload-prompt" class="space-y-1 text-center">
                    <svg class="mx-auto h-12 w-12 text-slate-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div class="flex text-sm text-slate-600">
                        <label for="image"
                               class="relative cursor-pointer bg-white rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                            <span>Upload a file</span>
                            <input id="image" name="image" type="file" class="sr-only" accept="image/*" data-testid="input-image">
                        </label>
                        <p class="pl-1">or drag and drop</p>
                    </div>
                    <p class="text-xs text-slate-500">PNG, JPG, GIF up to 10MB</p>
                </div>
            {% endif %}
        </div>
    </div>

    <!-- Title -->
    <div>
        <label for="title" class="block text-sm font-medium text-slate-700 mb-2">
            Special Title
        </label>
        <input
            type="text"
            id="title"
            name="title"
            required
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="e.g., Truffle Mushroom Risotto"
            value="{% if special %}{{ special.title }}{% endif %}"
            data-testid="input-title"
        >
    </div>

    <!-- Description -->
    <div>
        <div class="flex items-center justify-between mb-2">
            <label for="description" class="block text-sm font-medium text-slate-700">
                Description
            </label>
            <button
                type="button"
                id="enhance-btn"
                class="text-sm text-blue-600 hover:text-blue-700 font-medium"
                data-testid="button-enhance-description">
                ✨ Enhance with AI
            </button>
        </div>
        <textarea
            id="description"
            name="description"
            rows="4"
            required
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Describe your special dish..."
            data-testid="textarea-description">{% if special %}{{ special.description }}{% endif %}</textarea>
        <p class="mt-1 text-sm text-slate-500">Describe the ingredients, cooking method, and what makes it special.</p>
    </div>

    <!-- Price -->
    <div>
        <label for="price" class="block text-sm font-medium text-slate-700 mb-2">
            Price
        </label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="text-slate-500 sm:text-sm">$</span>
            </div>
            <input
                type="number"
                id="price"
                name="price"
                step="0.01"
                min="0"
                required
                class="w-full pl-7 pr-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                placeholder="0.00"
                value="{% if special %}{{ special.price }}{% endif %}"
                data-testid="input-price"
            >
        </div>
    </div>

    <!-- Date Range -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label for="start_date" class="block text-sm font-medium text-slate-700 mb-2">
                Start Date
            </label>
            <input
                type="datetime-local"
                id="start_date"
                name="start_date"
                required
                class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                value="{% if special %}{{ special.start_date|date:'Y-m-d\\TH:i' }}{% endif %}"
                data-testid="input-start-date"
            >
        </div>
        <div>
            <label for="end_date" class="block text-sm font-medium text-slate-700 mb-2">
                End Date
            </label>
            <input
                type="datetime-local"
                id="end_date"
                name="end_date"
                required
                class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                value="{% if special %}{{ special.end_date|date:'Y-m-d\\TH:i' }}{% endif %}"
                data-testid="input-end-date"
            >
        </div>
    </div>

    <!-- Call to Action -->
    <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">
            Call to Action
        </label>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <select
                    id="cta_type"
                    name="cta_type"
                    class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    data-testid="select-cta-type"
                    onchange="toggleCtaField(this.value)">
                    <option value="web" {% if special and special.cta_type == "web" %}selected{% endif %}>Order Online</option>
                    <option value="call" {% if special and special.cta_type == "call" %}selected{% endif %}>Call to Order</option>
                </select>
            </div>
            <div>
                   <input
  type="url"
  id="cta_url"
  name="cta_url"
  class="... {% if special and special.cta_type != 'web' %}hidden{% endif %}"
  placeholder="https://your-website.com/order"
  value="{% if special %}{{ special.cta_url }}{% endif %}"
  {% if not special or special.cta_type == 'web' %}required{% endif %}
/>

<input
  type="tel"
  id="cta_phone"
  name="cta_phone"
  class="... {% if not special or special.cta_type != 'call' %}hidden{% endif %}"
  placeholder="+1 (555) 123-4567"
  value="{% if special and special.cta_phone %}{{ special.cta_phone }}{% endif %}"
  {% if special and special.cta_type == 'call' %}required{% endif %}
  pattern="^\+?1?\d{9,15}$"
/>


            </div>
        </div>
    </div>

    <!-- Submit -->
    <div class="flex items-center justify-end space-x-4 pt-4 border-t border-slate-200">
        <a href="{% url 'dashboard' %}" class="btn-outline" data-testid="button-cancel">
            Cancel
        </a>
        <button type="submit" class="btn-primary" data-testid="button-create-special">
            {% if special %}Update Special{% else %}Create Special{% endif %}
        </button>
    </div>
</form>
