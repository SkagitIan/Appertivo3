{% extends 'base/base.html' %}
{% block title %}Specials Calendar - Appertivo{% endblock %}
{% block content %}
<style>
/* Calendar container background */
/* Calendar container */
#calendar {
  background: white;
  border-radius: 1rem;
  padding: 1rem;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

/* Day numbers */
.fc .fc-daygrid-day-number {
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  color: #49475B;
  height: 2.5rem;
  width: 2.5rem;
  margin: auto;
  border-radius: 0.5rem;
}

/* Today highlight */
.fc .fc-day-today .fc-daygrid-day-number {
  border: 2px solid #f08000;
  color: #f08000;
}

/* Has special */
.fc-event {
  background: transparent !important;
  border: none;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 600;
  color: white;
}

</style>

<div class="min-h-screen bg-slate-50">
    {% include 'base/dashboard_nav.html' %}
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
      <div class="mb-8">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 w-full sm:w-auto">
            <!-- List Button -->
            <a href="?view=list"
               class="{% if current_view == 'list' %}
                  bg-[#f08000] text-white px-4 py-2 rounded-md shadow-md text-center font-semibold
                  transition transform duration-200 ease-in-out
                  hover:bg-[#ff9933] hover:scale-105 hover:shadow-lg
                  focus:outline-none focus:ring-2 focus:ring-[#f08000]/50
               {% else %}
                  bg-white text-[#49475B] border border-[#49475B] px-4 py-2 rounded-md text-center font-semibold
                  transition transform duration-200 ease-in-out
                  hover:bg-slate-100 hover:scale-105 hover:shadow-sm
                  focus:outline-none focus:ring-2 focus:ring-[#49475B]/50
               {% endif %}">
                List
            </a>

            <!-- Calendar Button -->
            <a href="?view=calendar"
               class="{% if current_view == 'calendar' %}
                  bg-[#f08000] text-white px-4 py-2 rounded-md shadow-md text-center font-semibold
                  transition transform duration-200 ease-in-out
                  hover:bg-[#ff9933] hover:scale-105 hover:shadow-lg
                  focus:outline-none focus:ring-2 focus:ring-[#f08000]/50
               {% else %}
                  bg-white text-[#49475B] border border-[#49475B] px-4 py-2 rounded-md text-center font-semibold
                  transition transform duration-200 ease-in-out
                  hover:bg-slate-100 hover:scale-105 hover:shadow-sm
                  focus:outline-none focus:ring-2 focus:ring-[#49475B]/50
               {% endif %}">
                Calendar
            </a>

            <!-- Create Special Button -->
            <a href="{% url 'create_special' %}"
               class="bg-[#f08000] text-white font-semibold px-4 py-2 rounded-md text-center
                      shadow-md transition transform duration-200 ease-in-out
                      hover:bg-[#ff9933] hover:scale-105 hover:shadow-lg
                      focus:outline-none focus:ring-2 focus:ring-[#f08000]/50"
               data-testid="button-create-first-special">
                + Create Special
            </a>
        </div>
    </div>
</div>

        <div class="mb-8 flex items-center justify-between">
            {% include 'app/partials/view_toggle.html' %}
        </div>
        <div id="calendar"></div>
    </main>
</div>

<div id="modal" 
     class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 px-2">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-lg max-h-[90vh] flex flex-col">
      <!-- Modal content -->
      <div id="modal-body" class="overflow-y-auto p-3 flex-1">
          <!-- form gets injected here -->
      </div>
      <div class="border-t border-slate-200 p-4">
          <button id="modal-close" 
                  class="w-full btn bg-[#f08000] text-white font-semibold py-2 rounded-md 
                         hover:bg-[#ff9933] transition">
              Close
          </button>
      </div>
  </div>
</div>

{{ events|json_script:"events-data" }}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const events = JSON.parse(document.getElementById('events-data').textContent);
  const calendarEl = document.getElementById('calendar');  // <-- define it here
  const createUrl = "{{ create_url }}";

  function dateInRange(dateStr, startStr, endStr) {
    const day = new Date(dateStr);
    return day >= new Date(startStr) && day <= new Date(endStr);
  }

  function openModal(url) {
    const modal = document.getElementById('modal');
    const body = document.getElementById('modal-body');

    fetch(url, { headers: { "X-Requested-With": "XMLHttpRequest" } })
      .then(resp => resp.text())
      .then(html => {
        body.innerHTML = html;
        modal.classList.remove('hidden');
      });
  }

  document.getElementById('modal-close').addEventListener('click', function() {
    document.getElementById('modal').classList.add('hidden');
  });

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    events: events,
    selectable: true,
    dateClick: function(info) {
      const dayEvents = events.filter(e => dateInRange(info.dateStr, e.start, e.end));
      if (dayEvents.length > 0) {
        openModal(dayEvents[0].form_url);
      } else {
        openModal(`${createUrl}?date=${info.dateStr}`);
      }
    },
    eventContent: function(arg) {
      return {
        html: `<div class="w-full h-full flex items-center justify-center text-white font-semibold">
                 ${arg.event.title}
               </div>`
      };
    },
    dayCellDidMount: function(arg) {
      arg.el.classList.add(
        'relative',
        'cursor-pointer',
        'rounded-lg',
        'transition',
        'duration-150',
        'hover:scale-105'
      );
      const dateStr = arg.date.toISOString().slice(0, 10);
      const dayEvents = events.filter(e => dateInRange(dateStr, e.start, e.end) && e.image);
      if (dayEvents.length > 0) {
        arg.el.style.backgroundImage = `url('${dayEvents[0].image}')`;
        arg.el.style.backgroundSize = 'cover';
        arg.el.style.backgroundPosition = 'center';
        arg.el.style.color = 'white';
      }
    }
  });

  calendar.render();
});


</script>
{% endblock %}
