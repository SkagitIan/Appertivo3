{% extends 'base/base.html' %}
{% block title %}Specials Calendar - Appertivo{% endblock %}
{% block content %}
<style>
/* Calendar container background */
#calendar {
  background-color: white;
  border-radius: 0.75rem; /* rounded corners */
  padding: 1rem;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* Month title */
.fc .fc-toolbar-title {
  color: #49475B; /* deep slate purple */
  font-weight: 600;
  font-size: 1.25rem;
}

/* Header buttons */
.fc .fc-button {
  background: #B993D6;   /* lavender */
  border: none;
  color: white;
  font-weight: 500;
  padding: 0.4rem 0.75rem;
  border-radius: 0.5rem;
  transition: background 0.2s;
}
.fc .fc-button:hover {
  background: #f08000;   /* orange highlight */
}

/* Today cell */
.fc .fc-day-today {
  background-color: #fcfcfc !important; /* bright orange */
  color: white;
  border-radius: 0.0rem;
  
}

.fc .fc-day {
    margin:1px;
    border-radius: 0.5rem;
}
/* Day cell frames */
.fc .fc-daygrid-day-frame {
  border-radius: 0.5rem;
  padding: 0.25rem;
  margin:1px;
}

/* Events */
.fc-event {
  border-radius: 0.375rem;
  font-size: 0.8rem;
  padding: 2px 4px;
  border: none;
  color: white;
}
.fc-event.fc-daygrid-event {
  background: #58B09C; /* seafoam green */
}

/* Add button in corner */
.fc .fc-daygrid-day .text-blue-500 {
  color: #B993D6 !important; /* lavender for “+” buttons */
}
</style>

<div class="min-h-screen bg-slate-50">
    {% include 'base/dashboard_nav.html' %}
    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
        <div class="mb-8 flex items-center justify-between">
            {% include 'app/partials/view_toggle.html' %}
        </div>
        <div id="calendar"></div>
    </main>
</div>

<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50" style="min-width: 300px;">
    <div class="bg-white p-4 rounded shadow max-w-sm w-full">
        <div id="modal-body" class="mb-4"></div>
        <button id="modal-close" class="btn-primary w-full">Close</button>
    </div>
</div>

{{ events|json_script:"events-data" }}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const events = JSON.parse(document.getElementById('events-data').textContent);
    const calendarEl = document.getElementById('calendar');
    const createUrl = "{{ create_url }}";

    function openModal(url) {
    const modal = document.getElementById('modal');
    const body = document.getElementById('modal-body');

    fetch(url, { headers: { "X-Requested-With": "XMLHttpRequest" } })
        .then(resp => resp.text())
        .then(html => {
            body.innerHTML = html;
            modal.classList.remove('hidden');
        });
    }

    document.getElementById('modal-close').addEventListener('click', function() {
        document.getElementById('modal').classList.add('hidden');
    });

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        events: events,
        dateClick: function(info) {
            const url = "{% url 'special_form_create_partial' %}?date=" + info.dateStr;
            openModal(url);
        },
        eventClick: function(info) {
        const url = info.event.extendedProps.card_url;
        openModal(url);
        },

        dayCellDidMount: function(arg) {
        const btn = document.createElement('button');
        btn.textContent = '+';
        btn.className = 'absolute top-1 left-1 text-xs bg-[#f08000] text-white px-1.5 py-0.5 rounded-full shadow-sm hover:bg-[#a47fca] transition';
        
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const url = "{% url 'special_form_create_partial' %}?date=" + arg.date.toISOString().slice(0,10);
            openModal(url);   // ✅ now fetches partial instead of injecting raw HTML
        });
        
        arg.el.style.position = 'relative';
        arg.el.appendChild(btn);
    }

    });
    calendar.render();
});
</script>
{% endblock %}
