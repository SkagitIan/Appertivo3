<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Appertivo - AI That Knows Your Restaurant{% endblock %}</title>
    {% block seo_meta %}
      <meta name="description" content="Appertivo uses AI to help restaurants create menu concepts, realistic dish imagery, and guest-ready experiences."/>
      <meta name="keywords" content="restaurant ai, menu innovation, culinary ai, restaurant marketing"/>
      <meta name="author" content="Appertivo"/>
      <meta name="robots" content="index,follow"/>
      <link rel="canonical" href="https://appertivo.com/"/>
      <meta property="og:locale" content="en_US"/>
      <meta property="og:type" content="website"/>
      <meta property="og:title" content="Appertivo - AI That Knows Your Restaurant"/>
      <meta property="og:description" content="Appertivo uses AI to help restaurants create menu concepts, realistic dish imagery, and guest-ready experiences."/>
      <meta property="og:url" content="https://appertivo.com/"/>
      <meta property="og:site_name" content="Appertivo"/>
      <meta property="og:image" content="https://placehold.co/1200x630?text=Appertivo+AI"/>
      <meta property="og:image:alt" content="Chef reviewing AI-generated menu concepts in Appertivo"/>
      <meta name="twitter:card" content="summary_large_image"/>
      <meta name="twitter:title" content="Appertivo - AI That Knows Your Restaurant"/>
      <meta name="twitter:description" content="Appertivo uses AI to help restaurants create menu concepts, realistic dish imagery, and guest-ready experiences."/>
      <meta name="twitter:image" content="https://placehold.co/1200x630?text=Appertivo+AI"/>
      <meta name="twitter:image:alt" content="Chef reviewing AI-generated menu concepts in Appertivo"/>
      <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@type": "Organization",
          "name": "Appertivo",
          "url": "https://appertivo.com/",
          "logo": "https://placehold.co/512x512?text=Appertivo+Logo",
          "description": "Appertivo delivers restaurant-ready menu innovation, AI dish imagery, and guest experience insights.",
          "sameAs": [
            "https://www.linkedin.com/company/appertivo",
            "https://www.instagram.com/appertivo"
          ]
        }
      </script>
    {% endblock %}
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap"
    >
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap"
    >
      <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://unpkg.com/alpinejs" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
        }

        a:hover {
            text-decoration: none;
        }

        .topbar {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 100;
        }

        .topbar-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.5rem;
            border-radius: 9999px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.35);
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            backdrop-filter: blur(14px);
            white-space: nowrap;
        }

        .topbar-link:hover {
            border-color: rgba(167, 139, 250, 0.6);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 18px 32px rgba(167, 139, 250, 0.22);
        }

        .topbar-link .indicator {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 9999px;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.3);
            font-size: 0.85rem;
        }

        @media (max-width: 640px) {
            .topbar {
                top: 1rem;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }

            .topbar-link {
                padding: 0.55rem 1.25rem;
                font-size: 0.9rem;
            }
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 1200px;
        }

        .logo {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            color: #94a3b8;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero h1 .highlight {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 400;
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: #cbd5e1;
            max-width: 700px;
            margin: 0 auto 3rem;
            line-height: 1.8;
        }

        .hero .subtext {
            font-size: clamp(0.875rem, 1.5vw, 1rem);
            color: #a78bfa;
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(167, 139, 250, 0.3);
        }

        .btn-outline {
            border: 1px solid rgba(236, 72, 153, 0.65);
            color: #f472b6;
            background: transparent;
        }

        .btn-outline:hover {
            transform: translateY(-2px);
            border-color: rgba(236, 72, 153, 0.85);
            color: #fecdd3;
            background: rgba(236, 72, 153, 0.12);
            box-shadow: 0 20px 40px rgba(236, 72, 153, 0.18);
        }

        .trial-badge {
            padding: 0.5rem 1.5rem;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.4);
            border-radius: 9999px;
            color: #e2e8f0;
            font-size: 0.875rem;
        }

        /* Floating Cards Preview */
        .floating-cards {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .floating-card {
            position: absolute;
            width: 300px;
            height: 200px;
            border-radius: 1.5rem;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            overflow: hidden;
            opacity: 0.4;
        }

        .floating-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.3) 0%, rgba(236, 72, 153, 0.3) 100%);
        }

        .card-1 { top: 10%; left: 5%; animation: float 6s ease-in-out infinite; }
        .card-2 { top: 60%; right: 10%; animation: float 8s ease-in-out infinite 1s; }
        .card-3 { bottom: 15%; left: 15%; animation: float 7s ease-in-out infinite 0.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-20px) rotate(-2deg); }
        }

        /* AI Training Section - HERO #2 */
        .ai-training-hero {
            padding: 8rem 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .ai-training-hero::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
        }

        .ai-training-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .ai-training-content h2 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }

        .ai-training-content h2 .highlight {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 400;
        }

        .ai-training-content .lead {
            font-size: clamp(1.125rem, 2vw, 1.5rem);
            color: #cbd5e1;
            max-width: 800px;
            margin: 0 auto 4rem;
            line-height: 1.8;
        }

        .training-sources {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .training-source {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1.5rem;
            padding: 2.5rem;
            transition: all 0.4s ease;
            text-align: center;
        }

        .training-source:hover {
            transform: translateY(-8px);
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 20px 60px rgba(167, 139, 250, 0.2);
        }

        .training-source-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        .training-source h3 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .training-source p {
            color: #94a3b8;
            line-height: 1.7;
        }

        /* Features Section */
        .features {
            padding: 8rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .section-header h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .section-header p {
            color: #94a3b8;
            font-size: 1.125rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .feature-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1.5rem;
            padding: 2.5rem;
            transition: all 0.4s ease;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 20px 60px rgba(167, 139, 250, 0.2);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            border-radius: 1rem;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .feature-card p {
            color: #94a3b8;
            line-height: 1.7;
        }

        /* Interactive Demo Section */
        .demo-section {
            padding: 8rem 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .demo-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .demo-content h2 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 0.02em;
        }

        .demo-content p {
            color: #94a3b8;
            font-size: 1.125rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .demo-visual {
            position: relative;
            height: 600px;
        }

        .concept-card {
            position: absolute;
            width: 400px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            transition: all 0.5s ease;
        }

        .concept-card.active {
            transform: scale(1.05);
            z-index: 10;
            border-color: rgba(167, 139, 250, 0.6);
            box-shadow: 0 30px 80px rgba(167, 139, 250, 0.3);
        }

        .concept-card:nth-child(1) { top: 0; left: 0; }
        .concept-card:nth-child(2) { top: 100px; left: 50px; opacity: 0.7; }
        .concept-card:nth-child(3) { top: 200px; left: 100px; opacity: 0.4; }

        .card-image {
            width: 100%;
            height: 200px;
            border-radius: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            font-weight: 500;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
        }

        .card-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 0.375rem 1rem;
            background: rgba(148, 163, 184, 0.2);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }

        /* How It Works */
        .how-it-works {
            padding: 8rem 2rem;
            max-width: 1320px;
            margin: 0 auto;
            position: relative;
        }

        .how-it-works::before {
            content: '';
            position: absolute;
            inset: 12% auto auto -120px;
            width: 260px;
            height: 260px;
            background: radial-gradient(50% 50% at 50% 50%, rgba(79, 70, 229, 0.25) 0%, rgba(15, 23, 42, 0) 70%);
            opacity: 0.75;
            pointer-events: none;
            filter: blur(2px);
        }

        .how-layout {
            display: grid;
            gap: clamp(2.5rem, 6vw, 4.5rem);
            grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
            align-items: start;
            margin-top: 4rem;
        }

        .how-intro-card {
            position: relative;
            padding: clamp(2rem, 4vw, 2.75rem);
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.32);
            box-shadow: 0 48px 80px -48px rgba(8, 11, 19, 0.75);
            display: grid;
            gap: 1.5rem;
            overflow: hidden;
        }

        .how-intro-card::after {
            content: '';
            position: absolute;
            inset: auto -40% -45% auto;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.32), rgba(59, 130, 246, 0));
            filter: blur(1px);
            animation: howPulse 7s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .how-intro-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.15), rgba(59, 130, 246, 0.28));
            color: rgba(226, 232, 240, 0.75);
            border: 1px solid rgba(148, 163, 184, 0.35);
        }

        .how-intro-card h3 {
            font-size: clamp(1.7rem, 3vw, 2.2rem);
            line-height: 1.35;
        }

        .how-intro-card p {
            color: rgba(226, 232, 240, 0.7);
            line-height: 1.75;
        }

        .how-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .how-pill {
            padding: 0.55rem 1.15rem;
            border-radius: 9999px;
            background: rgba(148, 163, 184, 0.18);
            border: 1px solid rgba(148, 163, 184, 0.28);
            font-size: 0.85rem;
            color: rgba(226, 232, 240, 0.85);
        }

        .how-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .how-metric {
            flex: 1;
            min-width: 140px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 20px;
            padding: 1.15rem 1.25rem;
            display: grid;
            gap: 0.35rem;
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .how-metric:hover {
            transform: translateY(-4px);
            border-color: rgba(244, 114, 182, 0.45);
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: rgba(244, 114, 182, 0.95);
        }

        .metric-label {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(148, 163, 184, 0.7);
        }

        .how-steps {
            --timeline-x: clamp(1rem, 3vw, 1.35rem);
            position: relative;
            padding-left: calc(var(--timeline-x) + 2.6rem);
            display: grid;
            gap: clamp(1.75rem, 2.5vw, 2.75rem);
        }

        .how-steps::before {
            content: '';
            position: absolute;
            left: var(--timeline-x);
            top: 0.5rem;
            bottom: 0.5rem;
            width: 2px;
            background: linear-gradient(180deg, rgba(244, 114, 182, 0.4), rgba(59, 130, 246, 0.4));
            opacity: 0.7;
            animation: howLineGlow 6s ease-in-out infinite;
            box-shadow: 0 0 0 rgba(244, 114, 182, 0);
        }

        .how-step {
            position: relative;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 24px;
            padding: clamp(1.6rem, 3vw, 2.2rem) clamp(1.75rem, 3vw, 2.4rem);
            box-shadow: 0 30px 60px -40px rgba(8, 11, 19, 0.85);
            display: grid;
            gap: 0.75rem;
            overflow: hidden;
            opacity: 0;
            transform: translate3d(0, 32px, 0);
            animation: howFadeUp 0.9s ease forwards;
            animation-delay: var(--reveal-delay, 0s);
            transition: transform 0.35s ease, border-color 0.35s ease;
        }

        .how-step::before {
            content: attr(data-step);
            position: absolute;
            left: calc(var(--timeline-x) - 1.3rem);
            top: 1.4rem;
            width: 2.6rem;
            height: 2.6rem;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.92), rgba(59, 130, 246, 0.88));
            color: #0f172a;
            font-weight: 600;
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 18px 30px -18px rgba(59, 130, 246, 0.8);
        }

        .how-step::after {
            content: '';
            position: absolute;
            inset: auto 45% -45px -45px;
            height: 120px;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.18), rgba(59, 130, 246, 0));
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .how-step:hover {
            transform: translate3d(0, -6px, 0);
            border-color: rgba(244, 114, 182, 0.45);
        }

        .how-step:hover::after {
            opacity: 1;
        }

        .how-step-heading {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .how-step h3 {
            font-size: 1.55rem;
            letter-spacing: -0.01em;
        }

        .how-step-meta {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(148, 163, 184, 0.75);
        }

        .how-step p {
            color: rgba(226, 232, 240, 0.72);
            line-height: 1.75;
        }

        .how-step:nth-child(1) { --reveal-delay: 0s; }
        .how-step:nth-child(2) { --reveal-delay: 0.12s; }
        .how-step:nth-child(3) { --reveal-delay: 0.24s; }
        .how-step:nth-child(4) { --reveal-delay: 0.36s; }

        @keyframes howFadeUp {
            from {
                opacity: 0;
                transform: translate3d(0, 32px, 0);
            }
            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        @keyframes howPulse {
            from {
                transform: translate3d(0, 0, 0) scale(1);
                opacity: 0.45;
            }
            to {
                transform: translate3d(12px, -12px, 0) scale(1.12);
                opacity: 0.75;
            }
        }

        @keyframes howLineGlow {
            0%, 100% {
                opacity: 0.55;
            }
            50% {
                opacity: 0.85;
                box-shadow: 0 0 24px rgba(244, 114, 182, 0.25);
            }
        }

        @media (max-width: 1080px) {
            .how-layout {
                grid-template-columns: minmax(0, 1fr);
            }

            .how-intro-card {
                order: 2;
            }

            .how-steps {
                order: 1;
                margin-bottom: 2.5rem;
            }
        }

        @media (max-width: 720px) {
            .how-steps {
                --timeline-x: 0.85rem;
                padding-left: 2.65rem;
            }

            .how-step::before {
                top: 1.2rem;
            }
        }

        @media (max-width: 540px) {
            .metric-value {
                font-size: 1.5rem;
            }

            .how-steps {
                gap: 1.75rem;
            }

            .how-step {
                padding: 1.45rem 1.5rem 1.6rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .how-intro-card::after,
            .how-steps::before,
            .how-step {
                animation: none !important;
            }

            .how-step {
                opacity: 1;
                transform: none;
            }
        }

        /* Swipe-style Cards */
        .card {
            position: relative;
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 48px 80px -48px rgba(8, 11, 19, 0.75);
            backdrop-filter: saturate(140%) blur(8px);
            background: rgba(15, 23, 42, 0.4);
            overflow: visible;
            perspective: 1600px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            transform-style: preserve-3d;
            transition: transform 0.7s ease;
        }

        .card-face {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            overflow: hidden;
            backface-visibility: hidden;
            background-color: #0f172a;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .card-front {
            transform: rotateY(0deg);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.5rem;
            padding: 3.5rem 2.75rem;
        }

        .card-back {
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            background: #0f172a;
            isolation: isolate;
        }

        .card-back::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.35) 0%, rgba(15, 23, 42, 0.9) 85%, rgba(8, 11, 19, 0.95) 100%);
            z-index: 0;
        }

        .card-note {
            position: absolute;
            top: 1.1rem;
            left: 1.1rem;
            font-family: 'Shadows Into Light', cursive;
            font-size: clamp(0.95rem, 2.2vw, 1.15rem);
            color: #475569;
            letter-spacing: 0.04em;
            max-width: 75%;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 3;
            pointer-events: none;
        }

        .card-front::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(200deg, rgba(15, 23, 42, 0.05) 10%, rgba(15, 23, 42, 0.55) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .card-front--media {
            padding: 0;
        }

        .card-front--media::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(200deg, rgba(15, 23, 42, 0.05) 0%, rgba(15, 23, 42, 0.55) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .card-front--quote {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.85) 0%, rgba(15, 23, 42, 0.95) 100%);
        }

        .card-front--quote::after {
            display: none;
        }

        .card-media {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .card-back-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex: 1;
            flex-direction: column;
            padding: 4.75rem 2.25rem 2.5rem;
            gap: 1.5rem;
            overflow-y: auto;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.78) 0%, rgba(8, 11, 19, 0.96) 100%);
            scrollbar-width: thin;
            scrollbar-color: rgba(148, 163, 184, 0.12) transparent;
        }

        .card-back-content::-webkit-scrollbar {
            width: 4px;
        }

        .card-back-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .card-back-content::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.12);
            border-radius: 9999px;
        }

        .card-back-body {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            color: rgba(226, 232, 240, 0.92);
        }

        .card-back-heading {
            font-family: 'Playfair Display', serif;
            text-transform: uppercase;
            letter-spacing: 0.24em;
            font-weight: 500;
            font-size: clamp(1.2rem, 4.2vw, 1.8rem);
            color: #f8fafc;
        }

        .card-back-description {
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            line-height: 1.7;
        }

        /* Social Proof */
        .social-proof {
            padding: 8rem 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .testimonials {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 0;
            background: transparent;
            border: none;
            border-radius: 0;
            overflow: visible;
        }

        .testimonial-card-stack {
            position: relative;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            perspective: 1600px;
            min-height: clamp(360px, 52vw, 460px);
        }

        .testimonial-card {
            position: absolute;
            inset: 0;
            opacity: 0;
            transform: rotateY(-45deg) scale(0.96);
            pointer-events: none;
            transition: opacity 0.7s ease, transform 0.85s ease, visibility 0.7s ease;
            visibility: hidden;
        }

        .testimonial-card.is-active {
            opacity: 1;
            pointer-events: auto;
            transform: rotateY(0deg) scale(1);
            z-index: 2;
            visibility: visible;
        }

        .testimonial-card.is-exiting {
            opacity: 0;
            transform: rotateY(45deg) scale(0.96);
            z-index: 1;
            visibility: visible;
        }

        .testimonial-card .card-inner {
            transform: rotateY(-24deg);
            transition: transform 0.85s ease;
        }

        .testimonial-card.is-active .card-inner {
            transform: rotateY(0deg);
        }

        .testimonial-card.is-exiting .card-inner {
            transform: rotateY(24deg);
        }

        .card-quote-author {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .card-back-author {
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            color: rgba(148, 163, 184, 0.8);
            text-transform: uppercase;
        }

        .social-proof .card {
            height: clamp(340px, 55vw, 460px);
            margin: 0 auto;
            cursor: default;
            width: 100%;
        }

        .social-proof .card-front {
            padding: 3.25rem 2.5rem;
        }

        .social-proof .card-front--media {
            padding: 0;
        }

        .social-proof .card-front--media .card-note {
            color: rgba(15, 23, 42, 0.72);
        }

        .social-proof .card-front--media .card-media {
            opacity: 1;
        }

        .social-proof .card-front--media::after {
            mix-blend-mode: multiply;
        }

        .social-proof .testimonial-card[data-stage="quote"] .card-front {
            align-items: flex-start;
            text-align: left;
        }

        .social-proof .testimonial-card[data-stage="quote"] .card-back-content {
            align-items: flex-start;
            text-align: left;
        }

        .social-proof .testimonial-card[data-stage="concept"] .card-back-content,
        .social-proof .testimonial-card[data-stage="dish"] .card-back-content {
            align-items: center;
            text-align: center;
        }

        .social-proof .testimonial-card[data-stage="concept"] .card-back-body,
        .social-proof .testimonial-card[data-stage="dish"] .card-back-body {
            align-items: center;
        }

        .testimonial-stage-tag {
            font-size: 0.75rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(148, 163, 184, 0.75);
        }

        .testimonial-quote {
            font-style: italic;
            color: #e2e8f0;
            font-size: 1.2rem;
            line-height: 1.9;
        }

        .card-quote-author,
        .testimonial-author {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .testimonial-sketch-label {
            position: absolute;
            bottom: 1.05rem;
            left: 1.1rem;
            right: 1.1rem;
            font-family: 'Shadows Into Light', cursive;
            font-size: 1.35rem;
            letter-spacing: 0.08em;
            color: #f8fafc;
            text-shadow: 0 14px 28px rgba(15, 23, 42, 0.75);
            z-index: 2;
        }

        @media (min-width: 768px) {
            .testimonials {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (min-width: 1200px) {
            .testimonials {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .testimonial-card {
                position: relative;
                opacity: 1;
                transform: none;
            }

            .testimonial-card .card-inner,
            .testimonial-card.is-exiting .card-inner {
                transform: none;
            }
        }

        @media (max-width: 1024px) {
            .testimonials {
                gap: 2.5rem;
            }
        }

        @media (max-width: 640px) {
            .testimonial-card-stack {
                max-width: 320px;
                min-height: 380px;
            }

            .social-proof .card {
                height: auto;
                min-height: 320px;
            }
        }

        /* Pricing */
        .pricing {
            padding: 8rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .pricing-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(167, 139, 250, 0.6);
            border-radius: 2rem;

            text-align: center;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
        }

        .plan-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.4);
            border-radius: 9999px;
            font-size: 0.875rem;
            color: #e2e8f0;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .plan-price {
            font-size: 5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .plan-price span {
            font-size: 2rem;
            color: #94a3b8;
        }

        .plan-description {
            color: #cbd5e1;
            font-size: 1.25rem;
            margin-bottom: 3rem;
            line-height: 1.8;
        }

        .plan-features {
            list-style: none;
            margin-bottom: 3rem;
            text-align: left;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .plan-features li {
            padding: 1rem 0;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.125rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .plan-features li:last-child {
            border-bottom: none;
        }

        .plan-features li::before {
            content: '✓';
            color: #a78bfa;
            font-weight: bold;
            font-size: 1.5rem;

        }

        /* CTA Section */
        .final-cta {
            padding: 8rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .final-cta h2 {

            margin-bottom: 1.5rem;
            letter-spacing: 0.02em;
        }

        .final-cta p {
            color: #94a3b8;
            font-size: 1.25rem;

        }

        /* Footer */
        footer {
            padding: 4rem 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            border-top: 1px solid rgba(148, 163, 184, 0.2);

        .footer-content {

            gap: 3rem;
            margin-bottom: 3rem;
        }

        .footer-section h4 {
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {

        }

        .footer-section a {
            color: #cbd5e1;

        .footer-section a:hover {

        .footer-bottom {

        footer.minimal-footer {

        .content-hero {

        @media (max-width: 768px) {

            }
