<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Appertivo - AI That Knows Your Restaurant{% endblock %}</title>
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap"
    >
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .topbar {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 100;
        }

        .topbar-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.65rem 1.5rem;
            border-radius: 9999px;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.35);
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            backdrop-filter: blur(14px);
            white-space: nowrap;
        }

        .topbar-link:hover {
            border-color: rgba(167, 139, 250, 0.6);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 18px 32px rgba(167, 139, 250, 0.22);
        }

        .topbar-link .indicator {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 9999px;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.3);
            font-size: 0.85rem;
        }

        @media (max-width: 640px) {
            .topbar {
                top: 1rem;
                right: auto;
                left: 50%;
                transform: translateX(-50%);
            }

            .topbar-link {
                padding: 0.55rem 1.25rem;
                font-size: 0.9rem;
            }
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 1200px;
        }

        .logo {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            color: #94a3b8;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero h1 .highlight {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 400;
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: #cbd5e1;
            max-width: 700px;
            margin: 0 auto 3rem;
            line-height: 1.8;
        }

        .hero .subtext {
            font-size: clamp(0.875rem, 1.5vw, 1rem);
            color: #a78bfa;
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .cta-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 0.05em;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(167, 139, 250, 0.3);
        }

        .trial-badge {
            padding: 0.5rem 1.5rem;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.4);
            border-radius: 9999px;
            color: #e2e8f0;
            font-size: 0.875rem;
        }

        /* Floating Cards Preview */
        .floating-cards {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .floating-card {
            position: absolute;
            width: 300px;
            height: 200px;
            border-radius: 1.5rem;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            overflow: hidden;
            opacity: 0.4;
        }

        .floating-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.3) 0%, rgba(236, 72, 153, 0.3) 100%);
        }

        .card-1 { top: 10%; left: 5%; animation: float 6s ease-in-out infinite; }
        .card-2 { top: 60%; right: 10%; animation: float 8s ease-in-out infinite 1s; }
        .card-3 { bottom: 15%; left: 15%; animation: float 7s ease-in-out infinite 0.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-20px) rotate(-2deg); }
        }

        /* AI Training Section - HERO #2 */
        .ai-training-hero {
            padding: 8rem 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .ai-training-hero::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
        }

        .ai-training-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .ai-training-content h2 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }

        .ai-training-content h2 .highlight {
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 400;
        }

        .ai-training-content .lead {
            font-size: clamp(1.125rem, 2vw, 1.5rem);
            color: #cbd5e1;
            max-width: 800px;
            margin: 0 auto 4rem;
            line-height: 1.8;
        }

        .training-sources {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .training-source {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1.5rem;
            padding: 2.5rem;
            transition: all 0.4s ease;
            text-align: center;
        }

        .training-source:hover {
            transform: translateY(-8px);
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 20px 60px rgba(167, 139, 250, 0.2);
        }

        .training-source-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        .training-source h3 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .training-source p {
            color: #94a3b8;
            line-height: 1.7;
        }

        /* Features Section */
        .features {
            padding: 8rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .section-header h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .section-header p {
            color: #94a3b8;
            font-size: 1.125rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .feature-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1.5rem;
            padding: 2.5rem;
            transition: all 0.4s ease;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            border-color: rgba(167, 139, 250, 0.5);
            box-shadow: 0 20px 60px rgba(167, 139, 250, 0.2);
        }

        .feature-icon {
            width: 60px;
            height: 60px;
            border-radius: 1rem;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .feature-card p {
            color: #94a3b8;
            line-height: 1.7;
        }

        /* Interactive Demo Section */
        .demo-section {
            padding: 8rem 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        .demo-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .demo-content h2 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 0.02em;
        }

        .demo-content p {
            color: #94a3b8;
            font-size: 1.125rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .demo-visual {
            position: relative;
            height: 600px;
        }

        .concept-card {
            position: absolute;
            width: 400px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 1.5rem;
            padding: 2rem;
            transition: all 0.5s ease;
        }

        .concept-card.active {
            transform: scale(1.05);
            z-index: 10;
            border-color: rgba(167, 139, 250, 0.6);
            box-shadow: 0 30px 80px rgba(167, 139, 250, 0.3);
        }

        .concept-card:nth-child(1) { top: 0; left: 0; }
        .concept-card:nth-child(2) { top: 100px; left: 50px; opacity: 0.7; }
        .concept-card:nth-child(3) { top: 200px; left: 100px; opacity: 0.4; }

        .card-image {
            width: 100%;
            height: 200px;
            border-radius: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            font-weight: 500;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
        }

        .card-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 0.375rem 1rem;
            background: rgba(148, 163, 184, 0.2);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }

        /* How It Works */
        .how-it-works {
            padding: 8rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 3rem;
            margin-top: 4rem;
        }

        .step {
            text-align: center;
        }

        .step-number {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid rgba(148, 163, 184, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.5rem;
            color: #a78bfa;
        }

        .step h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .step p {
            color: #94a3b8;
            line-height: 1.7;
        }

        /* Social Proof */
        .social-proof {
            padding: 8rem 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .testimonials {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial {
            position: relative;
            background: rgba(30, 41, 59, 0.55);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 1.75rem;
            padding: 2.75rem;
            overflow: hidden;
        }

        .testimonial-rotator {
            position: relative;
            min-height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .testimonial-panel {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            gap: 1.5rem;
            opacity: 0;
            transform: translateY(18px);
            animation: testimonial-cycle 18s infinite;
            animation-fill-mode: both;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .testimonial-panel:nth-child(1) { animation-delay: 0s; }
        .testimonial-panel:nth-child(2) { animation-delay: 6s; }
        .testimonial-panel:nth-child(3) { animation-delay: 12s; }

        .testimonial-panel.is-quote {
            text-align: left;
            align-items: flex-start;
            justify-content: center;
            gap: 1.75rem;
        }

        .testimonial-stage-tag {
            font-size: 0.75rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(148, 163, 184, 0.75);
        }

        .testimonial-quote {
            font-style: italic;
            color: #e2e8f0;
            font-size: 1.2rem;
            line-height: 1.9;
        }

        .testimonial-author {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .testimonial-panel.is-sketch,
        .testimonial-panel.is-dish {
            text-align: center;
        }

        .testimonial-sketch {
            position: relative;
            width: min(280px, 70%);
            aspect-ratio: 4 / 5;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(15, 23, 42, 0.35);
            box-shadow: 0 28px 48px -36px rgba(8, 11, 19, 0.8);
        }

        .testimonial-sketch::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.05) 10%, rgba(15, 23, 42, 0.65) 100%);
            mix-blend-mode: multiply;
            pointer-events: none;
        }

        .testimonial-sketch img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .testimonial-sketch-label {
            position: absolute;
            bottom: 1rem;
            left: 1.1rem;
            right: 1.1rem;
            font-family: 'Shadows Into Light', cursive;
            font-size: 1.35rem;
            letter-spacing: 0.08em;
            color: #f8fafc;
            text-shadow: 0 14px 28px rgba(15, 23, 42, 0.75);
        }

        .testimonial-dish {
            width: min(320px, 80%);
            border-radius: 1.5rem;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: rgba(15, 23, 42, 0.4);
            box-shadow: 0 32px 60px -32px rgba(8, 11, 19, 0.85);
        }

        .testimonial-dish img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .testimonial-stage-note {
            max-width: 340px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(226, 232, 240, 0.75);
        }

        @keyframes testimonial-cycle {
            0%, 27% {
                opacity: 1;
                transform: translateY(0);
            }
            33%, 100% {
                opacity: 0;
                transform: translateY(24px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .testimonial-panel {
                position: relative;
                opacity: 1;
                transform: none;
                animation: none;
            }

            .testimonial-panel:not(:first-child) {
                display: none;
            }
        }

        @media (max-width: 640px) {
            .testimonial {
                padding: 2.25rem;
            }

            .testimonial-rotator {
                min-height: 360px;
            }

            .testimonial-stage-note {
                max-width: 100%;
            }
        }

        /* Pricing */
        .pricing {
            padding: 8rem 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .pricing-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(167, 139, 250, 0.6);
            border-radius: 2rem;
            padding: 4rem;
            text-align: center;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
        }

        .plan-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.4);
            border-radius: 9999px;
            font-size: 0.875rem;
            color: #e2e8f0;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .plan-price {
            font-size: 5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .plan-price span {
            font-size: 2rem;
            color: #94a3b8;
        }

        .plan-description {
            color: #cbd5e1;
            font-size: 1.25rem;
            margin-bottom: 3rem;
            line-height: 1.8;
        }

        .plan-features {
            list-style: none;
            margin-bottom: 3rem;
            text-align: left;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .plan-features li {
            padding: 1rem 0;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.125rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .plan-features li:last-child {
            border-bottom: none;
        }

        .plan-features li::before {
            content: '✓';
            color: #a78bfa;
            font-weight: bold;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        /* CTA Section */
        .final-cta {
            padding: 8rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .final-cta h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 0.02em;
        }

        .final-cta p {
            color: #94a3b8;
            font-size: 1.25rem;
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        /* Footer */
        footer {
            padding: 4rem 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            margin-bottom: 3rem;
        }

        .footer-section h4 {
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section ul li {
            margin-bottom: 0.75rem;
        }

        .footer-section a {
            color: #cbd5e1;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: #a78bfa;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            color: #64748b;
            font-size: 0.875rem;
        }

        footer.minimal-footer {
            max-width: 960px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 3rem;
            border-top: 1px solid rgba(148, 163, 184, 0.25);
            text-align: center;
        }

        footer.minimal-footer .minimal-footer__links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        footer.minimal-footer .minimal-footer__links a {
            color: #e2e8f0;
            text-decoration: none;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            transition: color 0.3s ease;
        }

        footer.minimal-footer .minimal-footer__links a:hover {
            color: #a78bfa;
        }

        footer.minimal-footer .minimal-footer__note {
            color: #64748b;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
        }

        .content-hero {
            position: relative;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 2rem 6rem;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0f172a 100%);
            overflow: hidden;
        }

        .content-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 20%, rgba(167, 139, 250, 0.18) 0%, transparent 55%);
        }

        .content-hero .floating-cards {
            opacity: 0.35;
        }

        .content-hero__inner {
            position: relative;
            z-index: 2;
            max-width: 960px;
        }

        .content-hero__inner .logo {
            margin-bottom: 2rem;
        }

        .content-hero__inner h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 300;
            margin-bottom: 1.5rem;
        }

        .content-hero__inner p {
            color: #cbd5e1;
            font-size: 1.125rem;
            max-width: 720px;
            margin: 0 auto 2rem;
            line-height: 1.8;
        }

        .content-wrapper {
            max-width: 1040px;
            margin: 0 auto;
            padding: 0 1.5rem 6rem;
            display: grid;
            gap: 2.5rem;
        }

        .content-section {
            background: rgba(30, 41, 59, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 1.75rem;
            padding: 2.5rem;
            backdrop-filter: blur(14px);
            text-align: left;
        }

        .content-section h2 {
            font-size: 1.75rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            margin-bottom: 1.25rem;
            color: #e2e8f0;
        }

        .content-section p {
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 1.25rem;
            font-size: 1rem;
        }

        .content-section ul {
            margin: 0 0 1rem 1.5rem;
            color: #94a3b8;
            line-height: 1.8;
        }

        .content-section li {
            margin-bottom: 0.75rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.75rem;
        }

        .info-card {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1.75rem;
            padding: 2rem;
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.35);
            text-align: left;
        }

        .info-card h3 {
            font-size: 1.35rem;
            margin-bottom: 0.75rem;
            color: #e2e8f0;
        }

        .info-card p {
            color: #94a3b8;
            line-height: 1.7;
            font-size: 0.98rem;
        }

        .info-card a {
            color: #a78bfa;
            text-decoration: none;
        }

        .info-card a:hover {
            color: #f472b6;
        }

        @media (max-width: 768px) {
            .demo-container {
                grid-template-columns: 1fr;
            }

            .demo-visual {
                height: 400px;
            }

            .concept-card {
                width: 100%;
                max-width: 350px;
            }

            .floating-card {
                display: none;
            }

            .training-sources {
                grid-template-columns: 1fr;
            }

            .content-hero {
                padding: 6rem 1.5rem 4rem;
            }

            .content-wrapper {
                padding: 0 1.25rem 4rem;
            }

            .content-section {
                padding: 2rem;
            }

            footer.minimal-footer .minimal-footer__links {
                gap: 0.75rem 1rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
</body>
</html>
