<button
  hx-post="{% url 'dish_favorite' dish.id %}?context={{ card_context|default:'grid' }}"
  hx-trigger="click"
  hx-swap="outerHTML"
  hx-target="closest .dish-card-wrapper"
  class="favorite-btn text-[#f08000] transition"
  aria-label="Favorite {{ dish.title }}"
>
  {% if dish.is_favorited %}
    ❤️
  {% else %}
    🤍
  {% endif %}
</button>
