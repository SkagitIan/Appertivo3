{# Shared styles and scripts for dish cards #}
<style>
  .dish-card-wrapper {
    margin: 6rem 0rem;
    padding: 0 0.75rem;
  }

  .dish-card-wrapper .flip-scene {
    height: 100%;
  }

  .flip-scene {
    perspective: 1200px;
  }

  .flip-card {
    position: relative;
    width: 100%;
    min-height: 320px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }

  .flip-card.show-back,
  .flip-card.loading {
    transform: rotateY(180deg);
  }

  .flip-face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 1rem;
    overflow: hidden;
  }

  .flip-face.front {
    transform: rotateY(0deg);
    overflow: visible;
  }

  .flip-face.flip-back {
    transform: rotateY(180deg);
  }

  .clamp-3 {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .dish-card-wrapper .flip-face.front {
    box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
  }

  .card-footer {
    position: relative;
    display: flex;
    justify-content: flex-end;
  }

  .card-action-tab {
    position: absolute;
    right: 0rem;
    bottom:0rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0.35rem;
    border-radius: 9999px;
    background: #ffffff;
    border: 1px solid rgba(148, 163, 184, 0.35);
    box-shadow: 0 12px 25px rgba(15, 23, 42, 0.18);
    z-index: 2;
  }

  .card-action-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.25rem;
    height: 2.25rem;
    border-radius: 9999px;
    background: transparent;
    border: none;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    transition: transform 0.2s ease, color 0.2s ease, background-color 0.2s ease;
  }

  .card-action-button:hover {
    transform: translateY(-1px);
  }

  .card-action-button:focus-visible {
    outline: 2px solid #6366f1;
    outline-offset: 2px;
  }

  .dish-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.25rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(73, 71, 91, 0.9);
    color: #49475b;
  }

  .dish-tag--category {
    background: rgba(185, 147, 214, 0.14);
  }

  .dish-tag--ingredient {
    background: rgba(142, 0, 139, 0.12);
  }

  .dish-tag--price {
    background: #dc2626;
    color: #ffffff;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .masonry-grid {
    column-count: 2; 
    column-gap: .25rem;
  }

  .masonry-grid .dish-card-wrapper {
    break-inside: avoid;
    margin-bottom: .75rem;
  }

  @media (min-width: 768px) {
    .masonry-grid {
      column-count: 2;
      margin-bottom: 1rem; 
    }
  }

  @media (min-width: 1280px) {
    .masonry-grid {
      column-count: 3;
      margin-bottom: 1.5rem;
    }
  }

  .flip-loading-face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    text-align: center;
    border-radius: 1rem;
    background: linear-gradient(135deg, #b993d6, #58b09c);
    color: #ffffff;
    transform: rotateY(180deg);
    backface-visibility: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .flip-card.loading .flip-loading-face {
    opacity: 1;
  }

  .flip-card.loading .flip-face {
    opacity: 0;
  }

  .loading-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  .loading-spinner {
    width: 2.75rem;
    height: 2.75rem;
    border-radius: 9999px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    animation: dish-card-spin 1s linear infinite;
  }

  .loading-copy {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  @keyframes dish-card-spin {
    to {
      transform: rotate(360deg);
    }
  }
</style>

<script>
  if (!window.__dishCardEnhancements) {
    window.__dishCardEnhancements = true;

    const shouldShowLoading = (elt) =>
      elt && (elt.classList.contains("dish-variation-btn") || elt.classList.contains("favorite-btn"));

    document.body.addEventListener("htmx:beforeRequest", function (evt) {
      const trigger = evt.detail.elt;
      if (shouldShowLoading(trigger)) {
        const card = trigger.closest(".flip-card");
        if (card) {
          card.classList.remove("show-back");
          card.classList.add("loading");
        }
      }
    });

    document.body.addEventListener("htmx:responseError", function (evt) {
      const trigger = evt.detail.elt;
      if (shouldShowLoading(trigger)) {
        const card = trigger.closest(".flip-card");
        if (card) {
          card.classList.remove("loading");
        }
      }
    });

    document.body.addEventListener("htmx:afterSwap", function (evt) {
      const trigger = evt.detail.elt;
      if (shouldShowLoading(trigger)) {
        const target = evt.detail.target;
        if (target) {
          const card = target.classList.contains("flip-card")
            ? target
            : target.querySelector(".flip-card");
          if (card) {
            card.classList.remove("loading");
            card.classList.remove("show-back");
          }
        }
      }
    });

    document.body.addEventListener("click", function (evt) {
      const card = evt.target.closest(".flip-card");
      if (!card) {
        return;
      }

      if (card.classList.contains("loading")) {
        return;
      }

      const actionable = evt.target.closest("button, a, [data-no-flip]");
      if (actionable) {
        return;
      }

      card.classList.toggle("show-back");
    });
  }
</script>
