{# Shared styles and scripts for dish cards #}
<style>
  .dish-card-wrapper {
    margin: 0;
    padding: 0;
  }

  .dish-card-wrapper .flip-scene {
    height: 100%;
  }

  .flip-scene {
    perspective: 1200px;
  }

  .flip-card {
    position: relative;
    width: 100%;
    min-height: 320px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }

  .flip-card.show-back,
  .flip-card.loading {
    transform: rotateY(180deg);
  }

  .flip-face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 0;
    overflow: hidden;
  }

  .flip-face.front {
    transform: rotateY(0deg);
    overflow: visible;
  }

  .flip-face.flip-back {
    transform: rotateY(180deg);
  }

  .dish-card-scroll {
    position: relative;
    overflow-y: auto;
    padding-right: 0.35rem;
    margin-right: -0.35rem;
    scrollbar-width: none;
    -ms-overflow-style: none;
    overscroll-behavior: contain;
    --dish-scroll-fade: rgba(255, 255, 255, 0.95);
  }

  .dish-card-scroll::-webkit-scrollbar {
    display: none;
  }

  .dish-card-scroll::before,
  .dish-card-scroll::after {
    content: "";
    position: sticky;
    left: 0;
    right: 0;
    height: 1.75rem;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .dish-card-scroll::before {
    top: 0;
    background: linear-gradient(to bottom, var(--dish-scroll-fade), transparent);
  }

  .dish-card-scroll::after {
    bottom: 0;
    background: linear-gradient(to top, var(--dish-scroll-fade), transparent);
  }

  .dish-card-scroll[data-scrollable="true"]::before,
  .dish-card-scroll[data-scrollable="true"]::after {
    opacity: 1;
  }

  .dish-card-scroll[data-at-top="true"]::before {
    opacity: 0;
  }

  .dish-card-scroll[data-at-bottom="true"]::after {
    opacity: 0;
  }

  .clamp-3 {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .dish-card-wrapper .flip-face.front {
    box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
  }

  .card-footer {
    position: relative;
    display: flex;
    justify-content: flex-end;
  }

  .card-action-tab {
    position: absolute;
    right: 0rem;
    bottom:0rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0.35rem;
    border-radius: 9999px;
    background: #ffffff;
    border: 1px solid rgba(148, 163, 184, 0.35);
    box-shadow: 0 12px 25px rgba(15, 23, 42, 0.18);
    z-index: 2;
  }

  .card-action-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.25rem;
    height: 2.25rem;
    border-radius: 9999px;
    background: transparent;
    border: none;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    transition: transform 0.2s ease, color 0.2s ease, background-color 0.2s ease;
  }

  .card-action-button:hover {
    transform: translateY(-1px);
  }

  .card-action-button:focus-visible {
    outline: 2px solid #6366f1;
    outline-offset: 2px;
  }

  .dish-menu-control {
    position: relative;
  }

  .dish-menu-trigger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 9999px;
    border: 1px solid rgba(148, 163, 184, 0.35);
    background: rgba(255, 255, 255, 0.96);
    color: #475569;
    box-shadow: 0 12px 25px rgba(15, 23, 42, 0.18);
    transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease;
  }

  .dish-menu-trigger:hover {
    transform: translateY(-1px);
    color: #1f2937;
  }

  .dish-menu-trigger:focus-visible {
    outline: 2px solid #6366f1;
    outline-offset: 2px;
  }

  .dish-menu-panel {
    position: absolute;
    right: 0;
    bottom: calc(100% + 0.5rem);
    min-width: 12rem;
    padding: 0.5rem;
    border-radius: 0rem;
    border: 1px solid rgba(148, 163, 184, 0.35);
    background: rgba(255, 255, 255, 0.98);
    box-shadow: 0 18px 30px rgba(15, 23, 42, 0.18);
    display: none;
    flex-direction: column;
    gap: 0.25rem;
    z-index: 10;
  }

  .dish-menu-panel.is-open {
    display: flex;
  }

  .dish-menu-options {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .dish-menu-option {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0.5rem;
    width: 100%;
    padding: 0.5rem 0.75rem;
    border-radius: 0rem;
    border: 1px solid transparent;
    background: white;
    color: #475569;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }

  .dish-menu-option:hover {
    background: #f8fafc;
    border-color: rgba(148, 163, 184, 0.4);
  }

  .dish-menu-option:focus-visible {
    outline: 2px solid #6366f1;
    outline-offset: 2px;
  }

  .dish-menu-option.is-loading {
    opacity: 0.6;
    cursor: wait;
  }

  .dish-menu-option--remove {
    margin-top: 0.25rem;
    border-style: dashed;
    color: #dc2626;
    background: #fff5f5;
  }

  .dish-menu-option--remove:hover {
    background: #fee2e2;
    border-color: rgba(248, 113, 113, 0.6);
  }

  .dish-menu-empty {
    margin: 0;
    padding: 0.5rem 0.25rem;
    font-size: 0.8rem;
    font-weight: 500;
    color: #64748b;
    max-width: 12rem;
    text-align: left;
  }

  .dish-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.25rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(73, 71, 91, 0.9);
    color: #49475b;
  }

  .dish-tag--category {
    background: rgba(185, 147, 214, 0.14);
  }

  .dish-tag--ingredient {
    background: rgba(142, 0, 139, 0.12);
  }

  .dish-tag--price {
    background: #dc2626;
    color: #ffffff;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .flip-loading-face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding:0rem;
    text-align: center;
    border-radius: 1rem;
    background: linear-gradient(135deg, #b993d6, #58b09c);
    color: #ffffff;
    transform: rotateY(180deg);
    backface-visibility: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .flip-card.loading .flip-loading-face {
    opacity: 1;
  }

  .flip-card.loading .flip-face {
    opacity: 0;
  }

  .loading-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  .loading-spinner {
    width: 2.75rem;
    height: 2.75rem;
    border-radius: 9999px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    animation: dish-card-spin 1s linear infinite;
  }

  .loading-copy {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  @keyframes dish-card-spin {
    to {
      transform: rotate(360deg);
    }
  }
</style>

<script>
  if (!window.__dishCardEnhancements) {
    window.__dishCardEnhancements = true;

    const dishGridId = "dishes-grid";
    const dishGridSelector = "#dishes-grid";
    const dishCardSelector = "[data-dish-card]";

    const reorderDishCards = () => {
      const grid = document.querySelector(dishGridSelector);
      if (!grid) {
        return;
      }
      const cards = Array.from(grid.querySelectorAll(dishCardSelector));
      if (cards.length < 2) {
        return;
      }
      const favorites = [];
      const others = [];
      cards.forEach((card) => {
        if (card.dataset && card.dataset.favorited === "true") {
          favorites.push(card);
        } else {
          others.push(card);
        }
      });
      const orderedCards = favorites.concat(others);
      orderedCards.forEach((card) => {
        grid.appendChild(card);
      });
    };

    const scheduleDishReorder = () => {
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(reorderDishCards);
      } else {
        setTimeout(reorderDishCards, 0);
      }
    };

    const dishTargetNeedsReorder = (target) => {
      if (!target) {
        return false;
      }
      if (target.id === dishGridId) {
        return true;
      }
      if (typeof target.matches === "function" && target.matches(dishCardSelector)) {
        return true;
      }
      if (typeof target.closest === "function") {
        const grid = target.closest(dishGridSelector);
        if (grid) {
          return true;
        }
      }
      if (typeof target.querySelector === "function" && target.querySelector(dishCardSelector)) {
        return true;
      }
      return false;
    };

    const scrollHintSelector = ".dish-card-scroll";

    const updateScrollHints = (container) => {
      if (!container) {
        return;
      }

      const scrollTop = container.scrollTop || 0;
      const clientHeight = container.clientHeight || 0;
      const scrollHeight = container.scrollHeight || 0;
      const canScroll = scrollHeight > clientHeight + 1;

      container.setAttribute("data-scrollable", canScroll ? "true" : "false");
      container.setAttribute("data-at-top", scrollTop <= 1 ? "true" : "false");
      container.setAttribute(
        "data-at-bottom",
        scrollTop + clientHeight >= scrollHeight - 1 ? "true" : "false"
      );
    };

    const bindScrollHints = (container) => {
      if (!container) {
        return;
      }

      if (container.dataset.scrollHintBound === "true") {
        updateScrollHints(container);
        return;
      }

      container.dataset.scrollHintBound = "true";
      updateScrollHints(container);
      container.addEventListener("scroll", () => updateScrollHints(container));
    };

    const setupScrollHints = () => {
      document.querySelectorAll(scrollHintSelector).forEach(bindScrollHints);
    };

    document.addEventListener("DOMContentLoaded", () => {
      reorderDishCards();
      setupScrollHints();
    });

    const shouldShowLoading = (elt) =>
      elt && (elt.classList.contains("dish-variation-btn") || elt.classList.contains("favorite-btn"));

    const openClass = "is-open";

    const getCsrfToken = () => {
      const input = document.querySelector('[name="csrfmiddlewaretoken"]');
      if (input) {
        return input.value;
      }
      const cookies = document.cookie ? document.cookie.split(";") : [];
      for (let i = cookies.length - 1; i >= 0; i -= 1) {
        const cookie = cookies[i].trim();
        if (cookie.startsWith("csrftoken=")) {
          return decodeURIComponent(cookie.slice("csrftoken=".length));
        }
      }
      return "";
    };

    const closeMenuPanel = (panel) => {
      if (!panel) {
        return;
      }
      panel.classList.remove(openClass);
      panel.setAttribute("aria-hidden", "true");
      const control = panel.closest("[data-menu-control]");
      const trigger = control ? control.querySelector("[data-menu-button]") : null;
      if (trigger) {
        trigger.setAttribute("aria-expanded", "false");
      }
    };

    const closeAllMenus = (exceptPanel) => {
      document.querySelectorAll("[data-menu-panel]").forEach((panel) => {
        if (panel === exceptPanel) {
          return;
        }
        closeMenuPanel(panel);
      });
    };

    const toggleMenuPanel = (button) => {
      const control = button.closest("[data-menu-control]");
      if (!control) {
        return;
      }
      const panel = control.querySelector("[data-menu-panel]");
      if (!panel) {
        return;
      }
      const isOpen = panel.classList.contains(openClass);
      if (isOpen) {
        closeMenuPanel(panel);
        return;
      }
      closeAllMenus(panel);
      panel.classList.add(openClass);
      panel.setAttribute("aria-hidden", "false");
      button.setAttribute("aria-expanded", "true");
    };

    const handleMenuSelection = (option) => {
      const card = option.closest("[data-dish-card]");
      if (!card) {
        return;
      }

      const moveUrl = card.dataset.moveUrl || "";
      const dishId = card.dataset.dishId || "";
      if (!moveUrl || !dishId) {
        option.textContent = option.dataset.label || option.textContent;
        closeAllMenus();
        return;
      }

      const menuId = option.dataset.menuId !== undefined ? option.dataset.menuId : "";
      const label = option.dataset.label || option.textContent.trim();
      const sourceMenuId = card.dataset.currentMenu || "";

      if (sourceMenuId === (menuId || "")) {
        closeAllMenus();
        return;
      }

      option.disabled = true;
      option.classList.add("is-loading");
      option.textContent = menuId ? "Adding…" : "Removing…";

      fetch(moveUrl, {
        method: "POST",
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCsrfToken(),
          Accept: "application/json",
        },
        body: JSON.stringify({
          dish_id: dishId,
          source_menu_id: sourceMenuId,
          target_menu_id: menuId || "",
        }),
      })
        .then((res) => {
          if (!res.ok) {
            throw new Error("Request failed");
          }
          return res.json().catch(() => ({}));
        })
        .then(() => {
          const normalizedMenu = menuId || "";
          card.dataset.currentMenu = normalizedMenu;
          const wrapper = document.getElementById(`favorite-dish-${dishId}`);
          if (wrapper) {
            wrapper.dataset.currentMenu = normalizedMenu;
          }

          const successText = menuId ? "Added!" : "Removed!";
          option.textContent = successText;

          setTimeout(() => {
            option.textContent = label;
            option.disabled = false;
            option.classList.remove("is-loading");
          }, 1000);

          const detail = {
            dishId,
            sourceMenuId,
            targetMenuId: normalizedMenu,
          };
          card.dispatchEvent(
            new CustomEvent("dish-menu-moved", { detail, bubbles: true })
          );

          closeAllMenus();
        })
        .catch(() => {
          option.textContent = "Try again";
          setTimeout(() => {
            option.textContent = label;
            option.disabled = false;
            option.classList.remove("is-loading");
          }, 1200);
        });
    };

    document.body.addEventListener("click", (evt) => {
      const menuButton = evt.target.closest("[data-menu-button]");
      if (menuButton) {
        evt.preventDefault();
        toggleMenuPanel(menuButton);
        return;
      }

      const option = evt.target.closest("[data-menu-option]");
      if (option) {
        evt.preventDefault();
        handleMenuSelection(option);
        return;
      }

      const insidePanel = evt.target.closest("[data-menu-panel]");
      if (!insidePanel) {
        closeAllMenus();
      }
    });

    document.addEventListener("keydown", (evt) => {
      if (evt.key === "Escape") {
        closeAllMenus();
      }
    });

    document.body.addEventListener("htmx:beforeRequest", function (evt) {
      const trigger = evt.detail.elt;
      if (shouldShowLoading(trigger)) {
        const card = trigger.closest(".flip-card");
        if (card) {
          card.classList.remove("show-back");
          card.classList.add("loading");
        }
      }
    });

    document.body.addEventListener("htmx:responseError", function (evt) {
      const trigger = evt.detail.elt;
      if (shouldShowLoading(trigger)) {
        const card = trigger.closest(".flip-card");
        if (card) {
          card.classList.remove("loading");
        }
      }
    });

    document.body.addEventListener("htmx:afterSwap", function (evt) {
      const trigger = evt.detail.elt;
      const target = evt.detail.target;
      if (shouldShowLoading(trigger)) {
        if (target) {
          const card = target.classList && target.classList.contains("flip-card")
            ? target
            : (typeof target.querySelector === "function" ? target.querySelector(".flip-card") : null);
          if (card) {
            card.classList.remove("loading");
            card.classList.remove("show-back");
          }
        }
      }

      if (dishTargetNeedsReorder(target)) {
        scheduleDishReorder();
      }

      setupScrollHints();
    });

    document.body.addEventListener("click", function (evt) {
      const card = evt.target.closest(".flip-card");
      if (!card) {
        return;
      }

      if (card.classList.contains("loading")) {
        return;
      }

      if (card.classList.contains("no-flip")) {
        return;
      }

      const actionable = evt.target.closest("button, a, [data-no-flip]");
      if (actionable) {
        return;
      }

      card.classList.toggle("show-back");
    });

    window.addEventListener("resize", () => {
      document.querySelectorAll(scrollHintSelector).forEach(updateScrollHints);
    });
  }
</script>
