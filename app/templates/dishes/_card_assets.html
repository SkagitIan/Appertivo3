{# Shared styles and scripts for dish cards #}
<style>
  .flip-scene {
    perspective: 1200px;
  }

  .flip-card {
    position: relative;
    width: 100%;
    min-height: 340px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }

  .flip-card.flipped {
    transform: rotateY(180deg);
  }

  .flip-face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 1rem;
    overflow: hidden;
  }

  .flip-face.front {
    transform: rotateY(0deg);
    overflow: visible;
  }

  .flip-face.flip-back {
    transform: rotateY(180deg);
  }

  .flip-face.front.enhanced {
    background-size: cover;
    background-position: center;
    color: white;
  }

  .flip-face.front.enhanced::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
  }

  .flip-face.front .card-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
    z-index: 1;
  }

  .flip-face.front.enhanced .card-inner h3 {
    color: #fff;
  }

  .flip-face.front.enhanced .card-inner p {
    color: rgba(255, 255, 255, 0.85);
  }

  .flip-face.front.enhanced .card-inner .text-slate-600 {
    color: rgba(255, 255, 255, 0.85);
  }

  .clamp-3 {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .dish-card-wrapper .flip-face.front {
    box-shadow: 0 15px 35px rgba(15, 23, 42, 0.08);
  }

  .flip-face.front.enhanced {
    box-shadow: 0 20px 40px rgba(15, 23, 42, 0.25);
  }

  .card-footer {
    position: relative;
    display: flex;
    justify-content: flex-end;
  }

  .card-action-tab {
    position: absolute;
    right: 0rem;
    bottom: 1rem;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0.35rem;
    border-radius: 9999px;
    background: #ffffff;
    border: 1px solid rgba(148, 163, 184, 0.35);
    box-shadow: 0 12px 25px rgba(15, 23, 42, 0.18);
    z-index: 2;
  }

  .card-action-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.5rem;
    height: 2.5rem;
    border-radius: 9999px;
    background: transparent;
    border: none;
    font-size: 1.1rem;
    line-height: 1;
    cursor: pointer;
    transition: transform 0.2s ease, color 0.2s ease, background-color 0.2s ease;
  }

  .card-action-button:hover {
    transform: translateY(-1px);
  }

  .card-action-button:focus-visible {
    outline: 2px solid #6366f1;
    outline-offset: 2px;
  }

  .flip-face.front.enhanced .card-action-tab {
    background: rgba(15, 23, 42, 0.85);
    border-color: rgba(255, 255, 255, 0.25);
    box-shadow: 0 18px 35px rgba(15, 23, 42, 0.5);
  }

  .flip-face.front.enhanced .card-action-button {
    color: rgba(248, 250, 252, 0.95);
  }

  .flip-face.front.enhanced .card-action-button:hover {
    color: #fca5a5;
  }

  .dish-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.25rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(73, 71, 91, 0.9);
    color: #49475b;
  }

  .dish-tag--category {
    background: rgba(185, 147, 214, 0.14);
  }

  .dish-tag--ingredient {
    background: rgba(142, 0, 139, 0.12);
  }

  .dish-tag--price {
    background: #dc2626;
    color: #ffffff;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .flip-face.front.enhanced .dish-tag {
    background: rgba(15, 23, 42, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.25);
    color: rgba(248, 250, 252, 0.95);
  }

  .flip-face.front.enhanced .dish-tag--category {
    background: rgba(165, 180, 252, 0.35);
    border-color: transparent;
  }

  .flip-face.front.enhanced .dish-tag--ingredient {
    background: rgba(244, 114, 182, 0.35);
    border-color: transparent;
  }

  .flip-face.front.enhanced .dish-tag--price {
    background: rgba(248, 113, 113, 0.95);
    border-color: transparent;
  }
</style>

<script>
  if (!window.__dishCardEnhancements) {
    window.__dishCardEnhancements = true;

    const shouldFlip = (elt) =>
      elt && (elt.classList.contains("dish-variation-btn") || elt.classList.contains("favorite-btn"));

    document.body.addEventListener("htmx:beforeRequest", function (evt) {
      const trigger = evt.detail.elt;
      if (shouldFlip(trigger)) {
        const card = trigger.closest(".flip-card");
        if (card) {
          card.classList.add("flipped");
        }
      }
    });

    document.body.addEventListener("htmx:responseError", function (evt) {
      const trigger = evt.detail.elt;
      if (shouldFlip(trigger)) {
        const card = trigger.closest(".flip-card");
        if (card) {
          card.classList.remove("flipped");
        }
      }
    });

    document.body.addEventListener("htmx:afterSwap", function (evt) {
      const trigger = evt.detail.elt;
      if (shouldFlip(trigger)) {
        const target = evt.detail.target;
        if (target) {
          const card = target.classList.contains("flip-card")
            ? target
            : target.querySelector(".flip-card");
          if (card) {
            card.classList.remove("flipped");
          }
        }
      }
    });
  }
</script>
