{# templates/dishes/grid.html #}
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
  {% for dish in dishes %}
    <div class="p-6 rounded-2xl shadow-md bg-white border border-slate-200 hover:shadow-lg transition">
      <h3 class="text-lg font-bold text-[#49475B]">{{ dish.title }}</h3>
      <p class="text-slate-600 mt-2">{{ dish.description }}</p>
      <div class="mt-3 text-sm text-slate-500">
        Tags: {{ dish.category_tags|join:", " }}
      </div>
    </div>
  {% endfor %}
</div>
