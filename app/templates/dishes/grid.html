{# templates/dishes/grid.html #}

<style>
  .flip-scene {
    perspective: 1200px;
  }

  .flip-card {
    position: relative;
    width: 100%;
    min-height: 220px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }

  .flip-card.flipped {
    transform: rotateY(180deg);
  }

  .flip-face {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 1rem;
    overflow: hidden;
  }

  .flip-face.front {
    transform: rotateY(0deg);
  }

  .flip-face.flip-back {
    transform: rotateY(180deg);
  }
</style>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for dish in dishes %}
    {% include "dishes/_dish_card.html" %}
  {% endfor %}
</div>

<script>
  if (!window.__dishVariationHandlers) {
    window.__dishVariationHandlers = true;

    document.body.addEventListener("htmx:beforeRequest", function (evt) {
      const trigger = evt.detail.elt;
      if (trigger && trigger.classList.contains("dish-variation-btn")) {
        const card = trigger.closest(".flip-card");
        if (card) {
          card.classList.add("flipped");
        }
      }
    });

    document.body.addEventListener("htmx:responseError", function (evt) {
      const trigger = evt.detail.elt;
      if (trigger && trigger.classList.contains("dish-variation-btn")) {
        const card = trigger.closest(".flip-card");
        if (card) {
          card.classList.remove("flipped");
        }
      }
    });
  }
</script>
