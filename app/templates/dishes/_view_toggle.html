{% with active=view_mode|default:'gallery' %}
<div class="flex flex-wrap items-center gap-3">
  <span class="text-xs font-semibold uppercase tracking-wide text-slate-400">View</span>
  <div class="inline-flex rounded-full border border-slate-200 bg-white shadow-sm overflow-hidden">
    {% for mode, icon, label in (
      ('gallery', 'fa-table-cells-large', 'Gallery'),
      ('list', 'fa-list', 'List'),
      ('carousel', 'fa-film', 'Carousel')
    ) %}
      {% with is_active=mode == active %}
        <button
          type="button"
          class="px-4 py-2 text-sm font-semibold flex items-center gap-2 transition {{ 'bg-[#B993D6]/10 text-[#49475B]' if is_active else 'text-slate-500 hover:bg-slate-100' }}"
          hx-post="{{ toggle_url }}"
          hx-target="#{{ target_id }}"
          hx-swap="innerHTML"
          hx-vals='{"view_mode": "{{ mode }}"}'
          aria-pressed="{{ is_active|yesno:'true,false' }}"
        >
          <i class="fa-solid {{ icon }}" aria-hidden="true"></i>
          <span>{{ label }}</span>
        </button>
      {% endwith %}
    {% endfor %}
  </div>
</div>
{% endwith %}
