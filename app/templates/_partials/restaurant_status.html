{% if menu_version and menu_version.status == "succeeded" %}
  <div class="rounded-xl bg-green-50 border border-green-200 p-4 flex items-center space-x-3">
    <span class="inline-block h-3 w-3 rounded-full bg-green-500"></span>
    <p class="text-green-800 font-medium">✅ Your restaurant is ready!</p>
  </div>
{% elif payload and payload.status == "failed" %}
  <div class="rounded-xl bg-red-50 border border-red-200 p-4">
    <p class="text-red-700 font-medium">
      We couldn’t find your menu online. Please paste a menu URL in
      <a href="{% url 'settings' restaurant.id %}" class="underline text-red-800">Settings</a>.
    </p>
  </div>
{% else %}
  <div class="rounded-xl bg-indigo-50 border border-indigo-200 p-4 flex items-center space-x-3 animate-pulse">
    <span class="inline-block h-3 w-3 rounded-full bg-indigo-400 animate-bounce"></span>
    <p class="text-indigo-700 font-medium">We’re building your AI menu assistant…</p>
  </div>
{% endif %}
