<style>
  .concept-card-wrapper {
    position: relative;
    padding: 0.25rem 0.25rem;
  }

  .concept-card-wrapper .flip-scene {
    height: 100%;
  }

  .concept-card-wrapper .flip-card {
    position: relative;
    width: 100%;
    min-height: 320px;
    transition: transform 0.6s ease;
    transform-style: preserve-3d;
    cursor: pointer;
  }

  .concept-card-wrapper .flip-card.no-flip {
    cursor: default;
  }

  @media (min-width: 768px) {
    .concept-card-wrapper .flip-card {
      min-height: 380px;
    }
  }

  @media (min-width: 1024px) {
    .concept-card-wrapper .flip-card {
      min-height: 420px;
    }
  }

  .concept-card-wrapper .flip-card.show-back,
  .concept-card-wrapper .flip-card.loading {
    transform: rotateY(180deg);
  }

  .concept-card-wrapper .flip-face {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 0rem;
    overflow: hidden;
  }

  .concept-card-wrapper .flip-face.front {
    transform: rotateY(0deg);
  }

  .concept-card-wrapper .flip-face.flip-back {
    transform: rotateY(180deg);
  }

  .concept-card-wrapper .concept-loading-face {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 1.5rem;
    text-align: center;
    border-radius: 0rem;
    background: linear-gradient(135deg, #b993d6, #f08000);
    color: #ffffff;
    transform: rotateY(180deg);
    backface-visibility: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .concept-card-wrapper .flip-card.loading .concept-loading-face {
    opacity: 1;
  }

  .concept-card-wrapper .flip-card.loading .flip-face {
    opacity: 0;
  }

  .concept-card-wrapper .flip-card.concept-generating .flip-face {
    opacity: 1;
  }

  .concept-favorite-btn--favorited {
    background: rgba(254, 226, 226, 0.95) !important;
    border-color: rgba(254, 202, 202, 0.9) !important;
    color: #e11d48 !important;
  }

  .concept-loading-spinner {
    width: 2.75rem;
    height: 2.75rem;
    border-radius: 9999px;
    border: 3px solid rgba(255, 255, 255, 0.35);
    border-top-color: #ffffff;
    animation: concept-card-spin 1s linear infinite;
  }

  .concept-card-wrapper .concept-progress {
    position: absolute;
    left: 0.75rem;
    right: 0.75rem;
    bottom: 0.75rem;
    height: 4px;
    border-radius: 9999px;
    background: rgba(255, 255, 255, 0.55);
    overflow: hidden;
    opacity: 0;
    transform: translateY(4px);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .concept-card-wrapper .concept-progress__bar {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #f08000, #b993d6);
    transform-origin: left center;
    animation: concept-progress-bar 1.6s ease-in-out infinite;
    animation-play-state: paused;
  }

  .concept-card-wrapper .flip-card.concept-generating .concept-progress {
    opacity: 1;
    transform: translateY(0);
  }

  .concept-card-wrapper .flip-card.concept-generating .concept-progress__bar {
    animation-play-state: running;
  }

  .concept-favorite-btn--busy {
    position: relative;
    pointer-events: none;
    color: #f43f5e !important;
  }

  .concept-favorite-btn--busy span {
    opacity: 0;
  }

  .concept-favorite-btn--busy::after {
    content: "";
    position: absolute;
    inset: 0;
    margin: auto;
    width: 1.25rem;
    height: 1.25rem;
    border-radius: 9999px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    animation: concept-card-spin 0.8s linear infinite;
  }

  [data-generate-button].concept-generate-btn--busy {
    pointer-events: none;
    opacity: 0.75;
  }

  [data-more-ideas] .more-ideas-spinner {
    display: none;
    width: 0.9rem;
    height: 0.9rem;
    border-radius: 9999px;
    border: 2px solid rgba(148, 163, 184, 0.55);
    border-top-color: rgba(79, 70, 229, 0.8);
  }

  [data-more-ideas].is-loading .more-ideas-spinner {
    display: inline-block;
    animation: concept-card-spin 0.9s linear infinite;
  }

  [data-more-ideas].is-loading .more-ideas-text {
    opacity: 0.6;
  }

  [data-more-ideas].is-loading i {
    opacity: 0;
  }

  @keyframes concept-card-spin {
    to {
      transform: rotate(360deg);
    }
  }

  @keyframes concept-progress-bar {
    0% {
      transform: scaleX(0.1);
    }
    50% {
      transform: scaleX(0.6);
    }
    100% {
      transform: scaleX(1);
    }
  }
</style>

<script>
  if (!window.__conceptCardEnhancements) {
    window.__conceptCardEnhancements = true;

    const conceptGridId = "concepts-grid";
    const conceptGridSelector = "#concepts-grid";
    const conceptCardSelector = "[data-concept-card]";

    const reorderConceptCards = () => {
      const grid = document.querySelector(conceptGridSelector);
      if (!grid) {
        return;
      }
      const cards = Array.from(grid.querySelectorAll(conceptCardSelector));
      if (cards.length < 2) {
        return;
      }
      const favorites = [];
      const others = [];
      cards.forEach((card) => {
        if (card.dataset && card.dataset.favorited === "true") {
          favorites.push(card);
        } else {
          others.push(card);
        }
      });
      const orderedCards = favorites.concat(others);
      orderedCards.forEach((card) => {
        grid.appendChild(card);
      });
    };

    const scheduleConceptReorder = () => {
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(reorderConceptCards);
      } else {
        setTimeout(reorderConceptCards, 0);
      }
    };

    const conceptTargetNeedsReorder = (target) => {
      if (!target) {
        return false;
      }
      if (target.id === conceptGridId) {
        return true;
      }
      if (typeof target.matches === "function" && target.matches(conceptCardSelector)) {
        return true;
      }
      if (typeof target.closest === "function") {
        const grid = target.closest(conceptGridSelector);
        if (grid) {
          return true;
        }
      }
      if (typeof target.querySelector === "function" && target.querySelector(conceptCardSelector)) {
        return true;
      }
      return false;
    };

    document.addEventListener("DOMContentLoaded", reorderConceptCards);

    const findConceptCard = (elt) => {
      if (!elt) {
        return null;
      }
      const wrapper = elt.closest('[data-concept-card]');
      return wrapper ? wrapper.querySelector('.flip-card') : null;
    };

    const isConceptFavoriteButton = (elt) => elt && elt.classList.contains('concept-favorite-btn');
    const isConceptDeleteButton = (elt) => elt && elt.classList.contains('concept-delete-btn');
    const isConceptSketchLoader = (elt) => elt && elt.classList.contains('concept-sketch-loader');
    const isConceptGenerateButton = (elt) => elt && elt.hasAttribute('data-generate-button');
    const isMoreIdeasButton = (elt) => elt && elt.hasAttribute('data-more-ideas');

    const shouldShowConceptLoading = (elt) => {
      if (!elt) {
        return false;
      }
      return isConceptDeleteButton(elt) || isConceptSketchLoader(elt);
    };

    const clearConceptTriggerState = (trigger) => {
      if (!trigger) {
        return;
      }
      const card = findConceptCard(trigger);
      if (card) {
        if (shouldShowConceptLoading(trigger)) {
          card.classList.remove('loading');
        }
        if (isConceptGenerateButton(trigger)) {
          card.classList.remove('concept-generating');
        }
      }
      if (isConceptFavoriteButton(trigger)) {
        trigger.classList.remove('concept-favorite-btn--busy');
      }
      if (isConceptGenerateButton(trigger)) {
        trigger.classList.remove('concept-generate-btn--busy');
        trigger.removeAttribute('disabled');
      }
      if (isMoreIdeasButton(trigger)) {
        trigger.classList.remove('is-loading');
        trigger.removeAttribute('disabled');
      }
    };

    document.body.addEventListener('htmx:beforeRequest', function (evt) {
      const trigger = evt.detail && evt.detail.elt;
      const card = findConceptCard(trigger);

      if (isConceptFavoriteButton(trigger)) {
        trigger.classList.add('concept-favorite-btn--busy');
      }

      if (isConceptGenerateButton(trigger)) {
        if (card) {
          card.classList.remove('show-back');
          card.classList.add('concept-generating');
        }
        trigger.classList.add('concept-generate-btn--busy');
        trigger.setAttribute('disabled', 'disabled');
      } else if (shouldShowConceptLoading(trigger)) {
        if (card) {
          card.classList.remove('show-back');
          card.classList.add('loading');
        }
      }

      if (isMoreIdeasButton(trigger)) {
        trigger.classList.add('is-loading');
        trigger.setAttribute('disabled', 'disabled');
      }
    });

    document.body.addEventListener('htmx:responseError', function (evt) {
      const trigger = evt.detail && evt.detail.elt;
      clearConceptTriggerState(trigger);
    });

    document.body.addEventListener('htmx:afterSwap', function (evt) {
      const trigger = evt.detail && evt.detail.elt;
      const target = evt.detail && evt.detail.target;

      if (shouldShowConceptLoading(trigger)) {
        if (!target) {
          clearConceptTriggerState(trigger);
        } else if (
          (typeof target.matches === 'function' && target.matches(conceptCardSelector)) ||
          (typeof target.querySelector === 'function' && target.querySelector(conceptCardSelector))
        ) {
          // replaced card
        } else {
          clearConceptTriggerState(trigger);
        }
      } else {
        clearConceptTriggerState(trigger);
      }

      if (conceptTargetNeedsReorder(target)) {
        scheduleConceptReorder();
      }
    });

    document.body.addEventListener('click', function (evt) {
      const card = evt.target.closest('[data-concept-card] .flip-card');
      if (!card) {
        return;
      }
      if (card.classList.contains('loading') || card.classList.contains('concept-generating')) {
        return;
      }
      const wrapper = card.closest('[data-concept-card]');
      if (wrapper && wrapper.dataset && wrapper.dataset.favorited !== 'true') {
        return;
      }
      const actionable = evt.target.closest('button, a, [data-no-flip]');
      if (actionable) {
        return;
      }
      card.classList.toggle('show-back');
    });
  }
</script>
