{% if concepts %}
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for concept in concepts %}
      {% url 'favorite-remove' 'concept' concept.id as remove_url %}
      {% include "concepts/_card.html" with concept=concept favorite_url_override=remove_url show_delete=False %}
    {% endfor %}
  </div>
{% else %}
  <p class="text-sm text-slate-500">You haven't favorited any concepts yet.</p>
{% endif %}
