{% for concept in concepts %}
<div class="flip-scene dish-card-wrapper" id="concept-{{ concept.id }}">
  <div
    class="flip-card cursor-pointer h-[320px] md:h-[380px] lg:h-[420px]"
    id="concept-{{ concept.id }}"
    hx-post="{% url 'dishes-generate' concept.id %}"
    role="link"
    data-overlay="false"
    data-messages='["Cooking up ideas…", "Still working…", "Serving soon!"]'
    tabindex="0"
  >
    <!-- Front face -->
    <div
      class="flip-face front bg-white rounded-2xl shadow-md border border-slate-200 transition hover:shadow-lg flex flex-col h-full"
    >
     <div class="relative z-10 flex flex-col items-center justify-center h-full p-5 md:p-6 text-center">
  
  <!-- Title -->
  <h2 class="text-lg md:text-xl lg:text-2xl font-bold text-[#49475B] mb-1">
    {{ concept.name }}
  </h2>

  <!-- Subtitle -->
  {% if concept.subtitle %}
  <p class="text-slate-600 text-sm md:text-base mb-3 max-w-xs md:max-w-sm">
    {{ concept.subtitle }}
  </p>
  {% endif %}

  <!-- Tags -->
  <div class="flex flex-wrap justify-center gap-2 mb-4">
    {% for tag in concept.tags %}
      <span class="inline-flex items-center px-3 py-1 rounded-full text-xs md:text-sm font-medium
        {% if forloop.counter0|divisibleby:5 %} bg-[#58B09C]/20 text-[#046c54]
        {% elif forloop.counter0|divisibleby:4 %} bg-[#f08000]/20 text-[#a14a00]
        {% elif forloop.counter0|divisibleby:3 %} bg-[#B993D6]/25 text-[#6b3c91]
        {% elif forloop.counter0|divisibleby:2 %} bg-[#49475B]/15 text-[#49475B]
        {% else %} bg-[#14080E]/15 text-[#14080E]
        {% endif %}
      ">{{ tag }}</span>
    {% endfor %}
  </div>

  <!-- Favorite button pinned bottom right -->
  <div class="absolute bottom-1 right-1">
    {% include "concepts/_favorite_button.html" %}
  </div>
</div>
</div>

    <!-- Back face (loading) -->
    <div class="flip-face flip-back bg-gradient-to-br from-[#B993D6] to-[#49475B] text-white p-6 rounded-2xl flex flex-col items-center justify-center h-[320px] md:h-[380px] lg:h-[420px]">
      <div class="animate-spin h-8 w-8 md:h-10 md:w-10 border-4 border-white/30 border-t-white rounded-full"></div>
      <p class="text-sm md:text-base font-medium mt-3">Generating dish ideas…</p>
    </div>
  </div>
</div>
{% endfor %}
