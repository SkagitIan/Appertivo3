{% extends "base_logged_in.html" %}
{% block content %}
<style>
.flip-scene {
perspective: 1200px;
}
.flip-card {
position: relative;
width: 100%;
min-height: 200px;
transition: transform 0.6s;
transform-style: preserve-3d;
}
.flip-card.flipped {
transform: rotateY(180deg);
}
.flip-face {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
backface-visibility: hidden;
border-radius: 1rem;
overflow: hidden;
}
/* Front */
.flip-face.front {
background: #fff;
display: flex;
flex-direction: column;
justify-content: space-between;
padding: 1.5rem;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
border: 1px solid #e2e8f0;
cursor: pointer;
transform: rotateY(0deg);
}
.concept-card-background {
position: absolute;
inset: 0;
background-size: cover;
background-position: center;
filter: grayscale(100%);
opacity: 0;
transition: opacity 0.4s ease;
z-index: 1;
pointer-events: none;
}
.concept-card-background--loading {
background: radial-gradient(circle at center, rgba(226,232,240,0.8), rgba(226,232,240,0.4));
opacity: 1;
}
.concept-card-background--loaded {
opacity:1;
}
.concept-card-overlay {
position: absolute;
inset: 0;
background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.95));
z-index: 5;
pointer-events: none;
}
.concept-favorite-btn--loading {
animation: concept-heart-pulse 0.9s ease-in-out infinite;
}
@keyframes concept-heart-pulse {
0%, 100% {
  transform: scale(1);
}
50% {
  transform: scale(1.12);
}
}
/* Back */
.flip-face.flip-back {
background: #1e293b;
color: #fff;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 1.5rem;
transform: rotateY(180deg);
}

#concepts-loading.htmx-request {
    display: inline-block !important;

  .dish-card-wrapper {
    padding-bottom: 2.5rem;
  }
  .dish-card-actions {
    position: absolute;
    right: 1.5rem;
    bottom: -1.5rem;
    display: flex;
    gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    border-radius: 9999px;
    background: #ffffff;
    box-shadow: 0 10px 25px rgba(73, 71, 91, 0.12);
    align-items: center;
  }

  .dish-card-actions button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

}
</style>
<div class="max-w-7xl mx-auto px-4 py-10">
  <div class="flex items-end justify-between mb-6">
    <button hx-get="{% url 'concepts-generate' %}" hx-target="#concepts-grid" hx-swap="innerHTML"
      class="bg-gradient-to-r from-[#FF8300] to-[#FF5C00] text-white font-semibold px-6 py-2 rounded-xl shadow hover:scale-105 transition flex items-center gap-2"
      hx-indicator="#concepts-loading">
      <span>Generate New Concepts</span>
      <i id="concepts-loading" class="fas fa-spinner fa-spin hidden"></i>
    </button>
  </div>
  <div id="concepts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
   {% include 'concepts/_concepts_grid.html' %}
  </div>
</div>
<script>

  document.body.addEventListener("htmx:beforeRequest", function (evt) {
    const trigger = evt.detail.elt;
    if (!trigger || trigger.classList.contains("concept-favorite-btn")) {
      return;
    }

    const card = trigger.closest(".flip-card");
    if (card) {
      card.classList.add("flipped");
    }
  });

  function clearConceptFavoriteLoading(elt) {
    if (!elt || !elt.classList || !elt.classList.contains("concept-background-loader")) {
      return;
    }
    const conceptId = elt.dataset.conceptId;
    if (!conceptId) {
      return;
    }
    const button = document.querySelector(
      `.concept-favorite-btn[data-concept-id="${conceptId}"]`
    );
    if (button) {
      button.classList.remove("concept-favorite-btn--loading");
    }
  }

  document.body.addEventListener("htmx:afterSwap", function (evt) {
    clearConceptFavoriteLoading(evt.detail.elt);
  });

  document.body.addEventListener("htmx:responseError", function (evt) {
    clearConceptFavoriteLoading(evt.detail.elt);
  });

  document.body.addEventListener("htmx:sendError", function (evt) {
    clearConceptFavoriteLoading(evt.detail.elt);
  });

</script>
{% endblock %}
