{% extends "base_logged_in.html" %}
{% block content %}
<style>
.flip-scene {
perspective: 1200px;
}
.flip-card {
position: relative;
width: 100%;
min-height: 200px;
transition: transform 0.6s;
transform-style: preserve-3d;
}
.flip-card.flipped {
transform: rotateY(180deg);
}
.flip-face {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
backface-visibility: hidden;
border-radius: 1rem;
overflow: hidden;
}
/* Front */
.flip-face.front {
background: #fff;
display: flex;
flex-direction: column;
justify-content: space-between;
padding: 1.5rem;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
border: 1px solid #e2e8f0;
cursor: pointer;
transform: rotateY(0deg);
}
/* Back */
.flip-face.flip-back {
background: #1e293b;
color: #fff;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 1.5rem;
transform: rotateY(180deg);
}

#concepts-loading.htmx-request {
    display: inline-block !important;
}
</style>
<div class="max-w-7xl mx-auto px-4 py-10">
  <div class="flex items-end justify-between mb-6">
    <button hx-get="{% url 'concepts-generate' %}" hx-target="#concepts-grid" hx-swap="innerHTML"
      class="bg-gradient-to-r from-[#FF8300] to-[#FF5C00] text-white font-semibold px-6 py-2 rounded-xl shadow hover:scale-105 transition flex items-center gap-2"
      hx-indicator="#concepts-loading">
      <span>Generate New Concepts</span>
      <i id="concepts-loading" class="fas fa-spinner fa-spin hidden"></i>
    </button>
  </div>
  <div id="concepts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
   {% include 'concepts/_concepts_grid.html' %}
  </div>
</div>
<script>
  document.body.addEventListener("htmx:beforeRequest", function (evt) {
    const card = evt.detail.elt.closest(".flip-card");
    if (card) {
      card.classList.add("flipped");
    }
  });
</script>
{% endblock %}
