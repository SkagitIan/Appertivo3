{# templates/concepts/grid.html #}
{% extends "base_logged_in.html" %}
{% block content %}

<style>
.flip-scene { perspective: 1200px; }
.flip-card { position: relative; width: 100%; transform-style: preserve-3d; transition: transform .6s; }
.flip-card.flipped { transform: rotateY(180deg); }
.flip-face { position: absolute; inset: 0; backface-visibility: hidden; }
.flip-back { transform: rotateY(180deg); }
</style>

<div class="max-w-7xl mx-auto px-4 py-10">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-3xl font-bold text-[#2E005D]">Concepts</h1>
    <button 
      hx-get="{% url 'concepts-generate' %}" 
      hx-target="#concepts-grid"
      hx-swap="outerHTML"
      class="bg-gradient-to-r from-[#FF8300] to-[#FF5C00] text-white font-semibold px-6 py-2 rounded-xl shadow hover:scale-105 transition">
      Generate New Concepts
    </button>
  </div>

  <div id="concepts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for concept in concepts %}
      <div class="flip-scene">
        <div class="flip-card" id="concept-{{ concept.id }}">
          <!-- FRONT -->
          <div class="flip-face bg-white p-6 rounded-2xl shadow-md border border-slate-200">
            <h2 class="text-xl font-bold text-[#49475B]">{{ concept.name }}</h2>
            <div class="mt-4 flex justify-between items-center">
              <span class="text-sm text-slate-500">Rank: {{ concept.rank_order }}</span>
              {% include "concepts/_favorite_button.html" %}
            </div>
            <button 
              hx-post="{% url 'dishes-generate' concept.id %}"
              hx-target="#concepts-grid"
              hx-swap="outerHTML"
              class="mt-4 w-full px-4 py-2 bg-[#FF8300] text-white rounded-xl shadow hover:bg-[#d96f00] transition">
              View Dish Ideas
            </button>
          </div>

          <!-- BACK (loading state) -->
          <div class="flip-face flip-back bg-slate-800 text-white p-6 rounded-2xl flex flex-col items-center justify-center">
            <svg class="animate-spin h-8 w-8 mb-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
            </svg>
            <p class="text-lg font-medium">Generating dish ideas…</p>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</div>

<script>
document.body.addEventListener("htmx:beforeRequest", function(evt) {
  if (evt.detail.elt.matches("[hx-post*='dishes-generate']")) {
    const card = evt.detail.elt.closest(".flip-card");
    if (card) card.classList.add("flipped");
  }
});
</script>

{% endblock %}
