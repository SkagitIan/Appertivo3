{% extends "base_logged_in.html" %}
{% block content %}
<style>
.flip-scene {
perspective: 1200px;
}
.flip-card {
position: relative;
width: 100%;
min-height: 210px;
transition: transform 0.6s;
transform-style: preserve-3d;
}
.flip-card.flipped {
transform: rotateY(180deg);
}
.flip-face {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
backface-visibility: hidden;
border-radius: 1rem;
overflow: hidden;
}
/* Front */
.flip-face.front {
background: #fff;
display: flex;
flex-direction: column;
justify-content: space-between;
padding: 1.5rem;
box-shadow: 0 2px 6px rgba(0,0,0,0.1);
border: 1px solid #e2e8f0;
cursor: pointer;
transform: rotateY(0deg);
}
.concept-card-background {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: grayscale(100%);
  opacity: 0;
  transition: opacity 1s ease, filter 1.2s ease;
  z-index: 1;
  pointer-events: none;
}
.concept-card-background--loading {
  background: radial-gradient(circle at center, rgba(226,232,240,0.8), rgba(226,232,240,0.4));
  opacity: 1;
}
.concept-card-background--loaded {
  opacity: 1;
  filter: grayscale(0%);
  animation: concept-background-reveal 0.9s ease forwards;
}
.concept-favorite-btn--favorited {
  background: rgba(254, 226, 226, 0.95) !important;
  border-color: rgba(254, 202, 202, 0.9) !important;
  color: #e11d48 !important;
}
.concept-favorite-btn--burst {
  animation: concept-heart-burst 0.45s ease;
}
@keyframes concept-background-reveal {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}
.concept-card-overlay {
position: absolute;
inset: 0;
background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.95));
z-index: 5;
pointer-events: none;
}
.concept-favorite-btn--loading {
  animation: concept-heart-pulse 0.9s ease-in-out infinite;
}
@keyframes concept-heart-pulse {
0%, 100% {
  transform: scale(1);
}
50% {
  transform: scale(1.12);
}
}
/* Back */
.flip-face.flip-back {
background: #1e293b;
color: #fff;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 1.5rem;
transform: rotateY(180deg);
}

#concepts-loading.htmx-request {
    display: inline-block !important;

  .dish-card-wrapper {
    padding-bottom: 2.5rem;
  }
  .dish-card-actions {
    position: absolute;
    right: 1.5rem;
    bottom: -1.5rem;
    display: flex;
    gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    border-radius: 9999px;
    background: #ffffff;
    box-shadow: 0 10px 25px rgba(73, 71, 91, 0.12);
    align-items: center;
  }

  .dish-card-actions button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

}
</style>
<div class="max-w-7xl mx-auto px-4 py-1">
<!-- Full-width header section -->
<div class="w-full bg-gradient-to-r from-[#B993D6] to-[#58B09C] py-8 px-6 shadow-md rounded mb-4">
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
    <!-- Text content -->
<div class="text-center md:text-left max-w-2xl">
  <h1 class="hidden sm:block text-3xl md:text-4xl font-extrabold text-white drop-shadow-sm">
    Menu Concept Studio
  </h1>
  <p class="mt-3 text-base md:text-lg text-white/90 leading-relaxed">
    Discover innovative dining experiences crafted for your restaurant.  
    Click any concept to explore detailed dish ideas and bring your vision to life.
  </p>
</div>


    <!-- Generate button -->
    <button
      id="generateBtn"
      hx-get="{% url 'concepts-generate' %}"
      hx-target="#concepts-grid"
      hx-swap="innerHTML"
      class="relative inline-flex items-center gap-2 bg-gradient-to-r from-[#f08000] to-[#FF5C00] text-white font-semibold px-6 py-3 rounded-xl shadow-lg hover:scale-105 transition"
    >
      <!-- Spinner (hidden until active) -->
      <svg id="concepts-loading" class="hidden animate-spin h-5 w-5 text-white"
           xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10"
                stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8v4a4 4 0 
              00-4 4H4z"></path>
      </svg>
      <span class="button-text">Generate New Concepts</span>
    </button>
  </div>
</div>

  <div id="concepts-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
   {% include 'concepts/_concepts_grid.html' %}
  </div>

  <div class="mt-8">
    <button
      id="concepts-favorites-btn"
      hx-get="{% url 'concepts-favorites' %}"
      hx-target="#concepts-favorites"
      hx-swap="innerHTML"
      class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white/80 px-4 py-2 text-sm font-medium text-slate-600 shadow-sm transition hover:bg-white hover:text-[#49475B]"
    >
      <span>See favorites</span>
    </button>
    <div id="concepts-favorites" class="mt-6"></div>
  </div>
</div>
<script>

  function setFavoriteButtonState(button, favorited) {
    if (!button) {
      return;
    }
    button.dataset.favorited = favorited ? "true" : "false";
    button.classList.toggle("concept-favorite-btn--favorited", favorited);
    const heart = button.querySelector('span[aria-hidden="true"]');
    if (heart) {
      heart.textContent = favorited ? "❤️" : "🤍";
    }
    const label = button.getAttribute("aria-label");
    if (label) {
      const updated = label.replace(/^(Favorite|Unfavorite)\s+/i, "");
      button.setAttribute(
        "aria-label",
        `${favorited ? "Unfavorite" : "Favorite"} ${updated}`.trim()
      );
    }
  }

  function revertFavoriteButton(button) {
    if (!button || !button.classList || !button.classList.contains("concept-favorite-btn")) {
      return;
    }
    const originalFavorited = button.dataset.originalFavorited;
    if (originalFavorited === undefined || originalFavorited === "") {
      delete button.dataset.awaitingResponse;
      return;
    }
    setFavoriteButtonState(button, originalFavorited === "true");
    delete button.dataset.originalFavorited;
    delete button.dataset.awaitingResponse;
    button.classList.remove("concept-favorite-btn--burst");
  }

  document.body.addEventListener("click", function (evt) {
    const button = evt.target.closest(".concept-favorite-btn");
    if (!button) {
      return;
    }
    if (button.dataset.awaitingResponse === "true") {
      evt.preventDefault();
      return;
    }

    const currentFavorited = button.dataset.favorited === "true";
    button.dataset.originalFavorited = currentFavorited ? "true" : "false";
    const nextFavorited = !currentFavorited;
    setFavoriteButtonState(button, nextFavorited);
    button.classList.remove("concept-favorite-btn--burst");
    void button.offsetWidth;
    button.classList.add("concept-favorite-btn--burst");
    button.dataset.awaitingResponse = "true";
  });

  document.body.addEventListener("htmx:beforeRequest", function (evt) {
    const triggeringEvent = evt.detail && evt.detail.triggeringEvent;
    if (
      triggeringEvent &&
      triggeringEvent.target &&
      triggeringEvent.target.closest(".concept-favorite-btn")
    ) {
      evt.preventDefault();
      return;
    }

    const trigger = evt.detail.elt;
    if (
      !trigger ||
      trigger.classList.contains("concept-favorite-btn") ||
      trigger.classList.contains("concept-background-loader")
    ) {
      return;
    }

    const card = trigger.closest(".flip-card");
    if (card) {
      card.classList.add("flipped");
    }
  });

  function clearConceptFavoriteLoading(elt) {
    if (!elt || !elt.classList || !elt.classList.contains("concept-background-loader")) {
      return;
    }
    const conceptId = elt.dataset.conceptId;
    if (!conceptId) {
      return;
    }
    const button = document.querySelector(
      `.concept-favorite-btn[data-concept-id="${conceptId}"]`
    );
    if (button) {
      button.classList.remove("concept-favorite-btn--loading");
    }
  }

  document.body.addEventListener("htmx:afterSwap", function (evt) {
    revertFavoriteButton(evt.detail.elt);
    clearConceptFavoriteLoading(evt.detail.elt);
  });

  document.body.addEventListener("htmx:responseError", function (evt) {
    revertFavoriteButton(evt.detail.elt);
    clearConceptFavoriteLoading(evt.detail.elt);
  });

  document.body.addEventListener("htmx:sendError", function (evt) {
    revertFavoriteButton(evt.detail.elt);
    clearConceptFavoriteLoading(evt.detail.elt);
  });

</script>
{% endblock %}
