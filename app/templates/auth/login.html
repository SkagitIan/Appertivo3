<html><body>Login</body></html>
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log In — Appertivo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#2E005D] via-[#5C008B] to-[#8E008B] min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-3xl font-bold text-center text-[#2E005D] mb-6">Welcome Back</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-slate-700">Email</label>
        <input type="email" name="email" required
          class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-[#FF8300] focus:border-[#FF8300] outline-none">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-slate-700">Password</label>
        <input type="password" name="password" required
          class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-2 focus:ring-2 focus:ring-[#FF8300] focus:border-[#FF8300] outline-none">
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full bg-gradient-to-r from-[#FF8300] to-[#FF5C00] text-white font-semibold py-3 rounded-xl shadow-md hover:scale-105 transition">
        Log In
      </button>

      <p class="text-center text-sm text-slate-600 mt-4">
        Don’t have an account? <a href="{% url 'signup' %}" class="text-[#5C008B] font-semibold hover:underline">Sign up</a>
      </p>
    </form>
  </div>
</body>
</html>
