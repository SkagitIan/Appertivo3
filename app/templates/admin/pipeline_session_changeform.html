{% extends "admin/change_form.html" %}
{% load i18n %}

{% block submit_buttons_bottom %}
  {{ block.super }}
  <div class="submit-row">
    {% if original.status != "completed" %}
      <a class="button" href="{% url 'admin:pipeline-continue' original.pk %}">
        Continue to {{ original.current_step|capfirst }}
      </a>
    {% endif %}
  </div>
{% endblock %}
